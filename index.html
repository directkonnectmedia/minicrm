<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini CRM</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f6f7f9;
      color: #1a1a1a;
    }
    h1 { margin: 0 0 4px; font-size: 24px; }
    .sub { color: #666; margin-bottom: 24px; font-size: 14px; }
    .header-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 12px; flex-wrap: wrap; }
    .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }
    button {
      padding: 8px 14px;
      background: #111827;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background: #374151; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.ghost { background: transparent; color: #374151; border: 1px solid #d1d5db; }
    button.ghost:hover { background: #f3f4f6; }
    button.danger { background: #dc2626; }
    button.danger:hover { background: #b91c1c; }
    button.primary-lg { font-size: 15px; padding: 10px 18px; }
    button.outline { background: #fff; color: #111827; border: 1px solid #d1d5db; }
    button.outline:hover { background: #f9fafb; }

    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td {
      text-align: left;
      padding: 12px 10px;
      border-bottom: 1px solid #e5e7eb;
      vertical-align: middle;
    }
    th { font-weight: 600; color: #555; background: #f9fafb; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
    tbody tr { cursor: pointer; transition: background 120ms; }
    tbody tr:hover { background: #f9fafb; }
    td.truncate { max-width: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    td.actions { white-space: nowrap; text-align: right; }

    .badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 500; }

    /* Web status */
    .ws-NotStarted   { background: #f3f4f6; color: #4b5563; }
    .ws-InProgress   { background: #dbeafe; color: #1e40af; }
    .ws-Review       { background: #fef3c7; color: #92400e; }
    .ws-NeedsFixing  { background: #fee2e2; color: #991b1b; }
    .ws-Finished     { background: #d1fae5; color: #065f46; }

    /* Client status */
    .cs-NewLead        { background: #dbeafe; color: #1e40af; }
    .cs-Contacted      { background: #ccfbf1; color: #115e59; }
    .cs-Interested     { background: #ede9fe; color: #5b21b6; }
    .cs-ProposalSent   { background: #fed7aa; color: #9a3412; }
    .cs-Negotiation    { background: #e0e7ff; color: #3730a3; }
    .cs-FollowUp       { background: #fef3c7; color: #92400e; }
    .cs-ClosedWon      { background: #d1fae5; color: #065f46; }
    .cs-ClosedLost     { background: #fee2e2; color: #991b1b; }
    .cs-Nurture        { background: #f3f4f6; color: #4b5563; }

    /* Motivation */
    .mo-NotSet { background: #f3f4f6; color: #6b7280; }
    .mo-Dead   { background: #1f2937; color: #f9fafb; }
    .mo-Cold   { background: #dbeafe; color: #1e40af; }
    .mo-Warm   { background: #fed7aa; color: #9a3412; }
    .mo-Hot    { background: #fee2e2; color: #991b1b; }
    .mo-VIP    { background: #fef9c3; color: #854d0e; border: 1px solid #eab308; }

    .empty { text-align: center; color: #999; padding: 32px; font-size: 14px; }
    .error { background: #fee2e2; color: #991b1b; padding: 12px; border-radius: 6px; margin-bottom: 16px; font-size: 14px; }
    a { color: #2563eb; }
    a.web-link { font-size: 13px; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 12px; border-bottom: 1px solid #e5e7eb; }
    .tab {
      background: transparent; color: #6b7280; border: none; border-bottom: 2px solid transparent;
      padding: 8px 14px; font-size: 14px; font-weight: 500; cursor: pointer; border-radius: 0;
    }
    .tab:hover { background: #f3f4f6; color: #1f2937; }
    .tab.active { color: #111827; border-bottom-color: #111827; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Overdue */
    .overdue-banner {
      background: #fee2e2; color: #991b1b; padding: 10px 14px; border-radius: 8px;
      margin-bottom: 12px; font-size: 14px; font-weight: 500; display: none;
    }
    .overdue-banner.show { display: block; }
    tr.row-overdue { background: #fef2f2; }
    tr.row-overdue:hover { background: #fee2e2; }
    .badge.overdue { background: #dc2626; color: white; margin-left: 6px; font-size: 10px; }
    .badge.due-today { background: #f59e0b; color: white; margin-left: 6px; font-size: 10px; }
    .fup-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: #6b7280; margin-right: 4px; }

    /* Active filter chips */
    .filter-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .filter-chip {
      background: #eef2ff; color: #3730a3; border: 1px solid #c7d2fe;
      padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 500;
    }

    /* Calendar */
    #calendar { min-height: 600px; }
    .fc .fc-toolbar-title { font-size: 1.2em !important; }
    .fc-event { cursor: pointer; }

    /* Follow-up box in detail view */
    .followup-box {
      background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px;
      padding: 12px; margin: 8px 20px 0; display: flex; align-items: center;
      justify-content: space-between; gap: 12px;
    }
    .followup-box.overdue { background: #fef2f2; border-color: #fecaca; }
    .followup-box .fup-text .fup-label2 { color: #6b7280; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 2px; }
    .followup-box .fup-text .fup-value { color: #1f2937; font-size: 14px; }
    .followup-box .fup-text .fup-value.overdue { color: #991b1b; font-weight: 600; }
    .fup-type-tag { display: inline-block; padding: 1px 8px; border-radius: 999px; font-size: 11px; font-weight: 500; margin-left: 8px; }
    .fup-type-Followup   { background: #dbeafe; color: #1e40af; }
    .fup-type-Appointment { background: #fed7aa; color: #9a3412; }

    /* Modals */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(17, 24, 39, 0.5);
      display: none;
      align-items: center; justify-content: center;
      z-index: 1000;
      padding: 16px;
    }
    .overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 12px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-height: 90vh;
    }
    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-title { font-size: 16px; font-weight: 600; }
    .modal-close {
      background: transparent; color: #6b7280; border: none;
      font-size: 22px; padding: 4px 8px; line-height: 1;
    }
    .modal-close:hover { background: #f3f4f6; }
    .modal-footer {
      padding: 14px 20px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      background: #f9fafb;
    }
    .step-meta { padding: 16px 20px 4px; color: #6b7280; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
    .step-body { padding: 4px 20px 16px; overflow-y: auto; flex: 1; }
    .step-title { font-size: 18px; font-weight: 600; margin: 0 0 6px; }
    .step-desc { color: #6b7280; font-size: 14px; margin: 0 0 16px; }

    /* Wizard progress */
    .progress { height: 4px; background: #e5e7eb; position: relative; }
    .progress-bar { height: 100%; background: #111827; transition: width 200ms ease; }

    /* Fields */
    .field { margin-bottom: 12px; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 4px;
      color: #374151;
    }
    .field input, .field select, .field textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }
    .field textarea { min-height: 80px; resize: vertical; }
    .field-error {
      color: #991b1b;
      font-size: 13px;
      background: #fee2e2;
      padding: 8px 10px;
      border-radius: 6px;
      margin-top: 8px;
    }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* Detail view */
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 16px; padding: 16px 20px; }
    .detail-grid .detail-full { grid-column: 1 / -1; }
    .detail-item .k {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6b7280;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .detail-item .v {
      font-size: 14px;
      color: #1f2937;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .detail-item .v.muted { color: #9ca3af; font-style: italic; }

    /* Notes thread (chat-style) */
    .notes-section { margin: 0 20px 12px; }
    .notes-section h4 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.04em; color: #6b7280; margin: 16px 0 6px; font-weight: 600; }
    .notes-thread {
      background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px;
      padding: 10px; max-height: 200px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 8px;
    }
    .notes-thread.empty { color: #9ca3af; font-style: italic; font-size: 13px; text-align: center; padding: 20px; }
    .note-entry {
      background: #fff; border: 1px solid #e5e7eb; border-radius: 6px;
      padding: 8px 10px; font-size: 13px;
    }
    .note-entry .note-time { font-size: 11px; color: #6b7280; margin-bottom: 3px; }
    .note-entry .note-text { color: #1f2937; white-space: pre-wrap; word-break: break-word; }
    .new-note-box { margin-top: 8px; }
    .new-note-box textarea { min-height: 60px; }
    .new-note-box .hint { font-size: 11px; color: #6b7280; margin-top: 4px; }

    /* Review (wizard) */
    .review-row {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid #f3f4f6;
      font-size: 14px;
    }
    .review-row:last-child { border-bottom: none; }
    .review-row .k { color: #6b7280; font-weight: 500; }
    .review-row .v { color: #1f2937; word-break: break-word; }
    .review-row .v.muted { color: #9ca3af; font-style: italic; }
  </style>
</head>
<body>

  <div class="tabs">

  <div id="filterChips" class="filter-chips"></div>

  <div class="tab-content active" data-view="list">
    <div id="overdueBanner" class="overdue-banner"></div>
    <div class="card">
      <table>
        <thead>
          <tr>
            <th style="width: 12%;">Company</th>
            <th style="width: 10%;">Business Type</th>
            <th style="width: 9%;">Client</th>
            <th style="width: 9%;">Phone</th>

  <div class="tab-content" data-view="calendar">

      <div id="calendar"></div>

  <!-- Wizard modal (Add New Client) -->
  <div class="overlay" id="wizardOverlay">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="wizardTitle">
      <div class="modal-header">
        <div class="modal-title" id="wizardTitle">Add New Client</div>
        <button class="modal-close" id="closeWizard" aria-label="Close">×</button>
      </div>
      <div class="progress"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
      <div class="step-meta" id="stepMeta">Step 1 of 7</div>
      <div class="step-body" id="stepBody"></div>
      <div class="modal-footer">
        <button class="ghost" id="backBtn">Back</button>
        <button id="nextBtn">Next</button>
      </div>
    </div>
  </div>

  <!-- Detail / Edit modal -->
  <div class="overlay" id="detailOverlay">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="detailTitle">
      <div class="modal-header">
        <div class="modal-title" id="detailTitle">Client Details</div>
        <button class="modal-close" id="closeDetail" aria-label="Close">×</button>
      </div>
      <div id="detailBody" class="step-body" style="padding: 0;"></div>
      <div class="modal-footer" id="detailFooter"></div>
    </div>
  </div>

  <!-- Schedule mini-wizard modal (date -> time -> type) -->
  <div class="overlay" id="scheduleOverlay">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <div class="modal-title">Schedule Follow-up / Appointment</div>
        <button class="modal-close" id="closeSchedule" aria-label="Close">×</button>
      </div>
      <div class="progress"><div class="progress-bar" id="scheduleProgress" style="width:33%"></div></div>
      <div class="step-meta" id="scheduleMeta">Step 1 of 3</div>
      <div class="step-body" id="scheduleBody"></div>
      <div class="modal-footer">
        <button class="ghost" id="scheduleBack">Back</button>
        <button id="scheduleNext">Next</button>
      </div>
    </div>
  </div>

  <!-- Filter modal -->
  <div class="overlay" id="filterOverlay">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <div class="modal-title">Apply Filters</div>
        <button class="modal-close" id="closeFilter" aria-label="Close">×</button>
      </div>
      <div class="step-body">
        <div class="field">
          <label>Business Type</label>
          <select id="f_business_type"><option value="">Any</option></select>
        </div>
        <div class="field">
          <label>Manager</label>
          <select id="f_manager">
            <option value="">Any</option>
            <option value="Ivan">Ivan</option>
            <option value="Hector">Hector</option>
            <option value="__unassigned">Unassigned</option>
          </select>
        </div>
        <div class="field">
          <label>Web Status</label>
          <select id="f_web_status"><option value="">Any</option></select>
        </div>
        <div class="field">
          <label>Client Status</label>
          <select id="f_client_status"><option value="">Any</option></select>
        </div>
        <div class="field">
          <label>Motivation</label>
          <select id="f_motivation"><option value="">Any</option></select>
        </div>
        <div class="field">
          <label>Follow-up</label>
          <select id="f_followup">
            <option value="">Any</option>
            <option value="overdue">Overdue</option>
            <option value="today">Due today</option>
            <option value="week">This week</option>
            <option value="any">Has any set</option>
            <option value="none">Not set</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="ghost" id="filterReset">Reset</button>
        <button id="filterApply">Apply Filters</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <script>
    const SUPABASE_URL = "https://ljghuyeugzmduzzvngkc.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxqZ2h1eWV1Z3ptZHV6enZuZ2tjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTIzOTIsImV4cCI6MjA5MjI4ODM5Mn0.aoeOD1Xvm_q_ZYlJ_x72J_WvmODkwvbNQ7dwbCa5bTY";

    const errEl = document.getElementById("configError");
    if (SUPABASE_URL.startsWith("__") || SUPABASE_ANON_KEY.startsWith("__")) {
      errEl.style.display = "block";
      errEl.textContent = "Supabase is not configured.";
    }

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const tbody = document.getElementById("rows");
    const emptyEl = document.getElementById("empty");

    // ---- Constants ----
    const WEB_STATUSES = ["Not Started", "In Progress", "Review", "Needs Fixing", "Finished"];
    const CLIENT_STATUSES = [
      "New Lead","Contacted","Interested","Proposal Sent",
      "Negotiation","Follow Up","Closed Won","Closed Lost","Nurture"
    ];
    const MOTIVATIONS = ["Not Set", "Dead", "Cold", "Warm", "Hot", "VIP"];
    const FOLLOW_UP_TYPES = ["Follow-up", "Appointment"];
    const NOTE_CAP = 5;

    // ---- Helpers ----
    const esc = (s) => (s ?? "").toString().replace(/[&<>"']/g, (c) => (
      { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
    ));
    const wsClass = (s) => "ws-" + (s || "Not Started").replace(/\s/g, "");
    const csClass = (s) => "cs-" + (s || "New Lead").replace(/\s/g, "");
    const moClass = (s) => "mo-" + (s || "Not Set").replace(/\s/g, "");
    const normPhone = (s) => (s || "").replace(/\D+/g, "");
    const fupTypeClass = (t) => "fup-type-" + (t || "Follow-up").replace(/[-\s]/g, "");

    function formatPhone(raw) {
      const d = normPhone(raw).slice(0, 10);
      if (!d) return "";
      if (d.length <= 3) return `(${d}`;
      if (d.length <= 6) return `(${d.slice(0,3)}) ${d.slice(3)}`;
      return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
    }
    function displayPhone(s) {
      if (!s) return "";
      const d = normPhone(s);
      if (d.length === 10) return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
      return s;
    }
    document.addEventListener("input", (e) => {
      if (e.target.matches('input[name="phone"]')) e.target.value = formatPhone(e.target.value);
    });

    function shortUrl(u) {
      if (!u) return "";
      try {
        const x = new URL(u.startsWith("http") ? u : "https://" + u);
        return x.hostname.replace(/^www\./, "");
      } catch { return u; }
    }

    // Follow-up state
    function fupState(iso) {
      if (!iso) return "none";
      const then = new Date(iso);
      const now = new Date();
      const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
      const tomStart = todayStart + 24*60*60*1000;
      const t = then.getTime();
      if (t < todayStart) return "overdue";
      if (t < tomStart) return "today";
      return "future";
    }
    function isThisWeek(iso) {
      if (!iso) return false;
      const then = new Date(iso);
      const now = new Date();
      const end = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 7);
      return then >= now && then <= end;
    }
    function formatDateTime(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      return d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" })
        + " · " + d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
    }
    function formatDateOnly(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      return d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
    }
    function formatTimeOnly(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      return d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
    }
    // Build ISO from date string (YYYY-MM-DD) + time string (HH:MM)
    function combineDateTime(dateStr, timeStr) {
      if (!dateStr) return null;
      const t = timeStr || "09:00";
      const iso = new Date(`${dateStr}T${t}:00`).toISOString();
      return iso;
    }
    function splitDateTime(iso) {
      if (!iso) return { date: "", time: "" };
      const d = new Date(iso);
      const pad = (n) => String(n).padStart(2, "0");
      return {
        date: `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`,
        time: `${pad(d.getHours())}:${pad(d.getMinutes())}`,
      };
    }

    // Notes
    function trimNotes(arr) {
      const a = Array.isArray(arr) ? arr : [];
      return a.slice(-NOTE_CAP);
    }
    function appendNote(arr, text) {
      if (!text || !text.trim()) return trimNotes(arr);
      const entry = { at: new Date().toISOString(), text: text.trim() };
      return trimNotes([...(Array.isArray(arr) ? arr : []), entry]);
    }

    // ---------- Filters ----------
    const DEFAULT_FILTERS = { business_type: "", manager: "", web_status: "", client_status: "", motivation: "", followup: "" };
    let filters = { ...DEFAULT_FILTERS };

    function anyFilterActive() {
      return Object.values(filters).some((v) => v && v !== "");
    }

    function applyFiltersToClients(list) {
      return list.filter((c) => {
        if (filters.business_type && c.business_type !== filters.business_type) return false;
        if (filters.manager) {
          if (filters.manager === "__unassigned") {
            if (c.manager) return false;
          } else if (c.manager !== filters.manager) return false;
        }
        if (filters.web_status && c.web_status !== filters.web_status) return false;
        if (filters.client_status && c.client_status !== filters.client_status) return false;
        if (filters.motivation && c.motivation !== filters.motivation) return false;
        if (filters.followup) {
          const state = fupState(c.follow_up_at);
          if (filters.followup === "overdue" && state !== "overdue") return false;
          if (filters.followup === "today" && state !== "today") return false;
          if (filters.followup === "week" && !isThisWeek(c.follow_up_at)) return false;
          if (filters.followup === "any" && !c.follow_up_at) return false;
          if (filters.followup === "none" && c.follow_up_at) return false;
        }
        return true;
      });
    }

    function renderFilterChips() {
      const chips = document.getElementById("filterChips");
      const parts = [];
      if (filters.business_type) parts.push(["Business", filters.business_type]);
      if (filters.manager) parts.push(["Manager", filters.manager === "__unassigned" ? "Unassigned" : filters.manager]);
      if (filters.web_status) parts.push(["Web Status", filters.web_status]);
      if (filters.client_status) parts.push(["Client Status", filters.client_status]);
      if (filters.motivation) parts.push(["Motivation", filters.motivation]);
      if (filters.followup) {
        const labels = { overdue: "Overdue", today: "Due today", week: "This week", any: "Has follow-up", none: "No follow-up" };
        parts.push(["Follow-up", labels[filters.followup] || filters.followup]);
      }
      chips.innerHTML = parts.map(([k, v]) => `<span class="filter-chip">${esc(k)}: ${esc(v)}</span>`).join("");
      document.getElementById("clearFilters").style.display = anyFilterActive() ? "" : "none";
      try { localStorage.setItem("crm_filters", JSON.stringify(filters)); } catch {}
    }

    try {
      const saved = localStorage.getItem("crm_filters");
      if (saved) filters = { ...DEFAULT_FILTERS, ...JSON.parse(saved) };
    } catch {}

    // ---------- Table render ----------
    function render() {
      const rows = applyFiltersToClients(allClients);
      tbody.innerHTML = "";
      if (!rows || rows.length === 0) {
        emptyEl.style.display = "block";
        document.getElementById("overdueBanner").classList.remove("show");
        renderFilterChips();
        return;
      }
      emptyEl.style.display = "none";
      let overdueCount = 0;
      for (const r of rows) {
        const tr = document.createElement("tr");
        tr.dataset.id = r.id;

        const fState = fupState(r.follow_up_at);
        let fupHtml = '<span style="color:#9ca3af;">Not set</span>';
        if (r.follow_up_at) {
          const dt = formatDateTime(r.follow_up_at);
          const typeTag = `<span class="fup-type-tag ${fupTypeClass(r.follow_up_type)}">${esc(r.follow_up_type || "Follow-up")}</span>`;
          let stateBadge = "";
          if (fState === "overdue") { stateBadge = '<span class="badge overdue">OVERDUE</span>'; overdueCount++; tr.classList.add("row-overdue"); }
          else if (fState === "today") { stateBadge = '<span class="badge due-today">TODAY</span>'; }
          fupHtml = `${esc(dt)} ${typeTag}${stateBadge}`;
        }

        tr.innerHTML = `
          <td class="truncate">${esc(r.company_name) || '<span style="color:#9ca3af;">—</span>'}</td>
          <td class="truncate">${esc(r.business_type) || '<span style="color:#9ca3af;">—</span>'}</td>
          <td class="truncate">${esc(r.client_name) || '<span style="color:#9ca3af;">—</span>'}</td>
          <td class="truncate">${r.phone ? esc(displayPhone(r.phone)) : '<span style="color:#9ca3af;">—</span>'}</td>
          <td>${esc(r.manager) || '<span style="color:#9ca3af;">—</span>'}</td>
          <td><span class="badge ${wsClass(r.web_status)}">${esc(r.web_status || "Not Started")}</span></td>
          <td><span class="badge ${csClass(r.client_status)}">${esc(r.client_status || "New Lead")}</span></td>
          <td><span class="badge ${moClass(r.motivation)}">${esc(r.motivation || "Not Set")}</span></td>
          <td class="truncate">${fupHtml}</td>
          <td class="actions"><button class="danger" data-action="delete" data-nolink>Del</button></td>
        `;
        tbody.appendChild(tr);
      }

      const banner = document.getElementById("overdueBanner");
      if (overdueCount > 0) {
        banner.textContent = `⚠️ ${overdueCount} client${overdueCount === 1 ? "" : "s"} overdue for follow-up`;
        banner.classList.add("show");
      } else {
        banner.classList.remove("show");
      }
      renderFilterChips();
    }

    let allClients = [];
    async function load() {
      const { data, error } = await sb
        .from("clients")
        .select("*")
        .order("created_at", { ascending: false });
      if (error) { alert("Load failed: " + error.message); return; }
      allClients = data || [];
      populateFilterModalOptions();
      render();
      refreshCalendar();
    }

    // Row click opens detail; delete button & website link don't trigger it.
    tbody.addEventListener("click", async (e) => {
      const noLink = e.target.closest("[data-nolink]");
      const tr = e.target.closest("tr");
      if (!tr) return;
      const id = tr.dataset.id;

      if (noLink && noLink.dataset.action === "delete") {
        if (!confirm("Delete this entry?")) return;
        const { error } = await sb.from("clients").delete().eq("id", id);
        if (error) { alert("Delete failed: " + error.message); return; }
        load();
        return;
      }
      if (noLink) return;
      openDetail(id);
    });

    const wizardSteps = [
      {
        title: "Company Info",
        desc: "Who is the business?",
        fields: [
          { name: "company_name", label: "Company name *", type: "text", required: true, placeholder: "Acme Paving Co." },
          { name: "business_type", label: "Business type", type: "datalist", list: "business_types", placeholder: "Pick one or type your own" },
        ],
      },
      {
        title: "Contact",

        fields: [
          { name: "client_name", label: "Client name", type: "text", placeholder: "Jane Doe" },
          { name: "phone", label: "Phone", type: "tel", placeholder: "(555) 123-4567", maxlength: 14, inputmode: "numeric", autocomplete: "tel-national" },
        ],
        validate: async (data) => {
          const p = normPhone(data.phone);

          { name: "finished_website", label: "Finished website", type: "url", placeholder: "https://yourclient.com" },
        ],
      },
      {
        title: "Assignment",
        desc: "Who's handling this and where does it stand?",
        fields: [
          { name: "manager", label: "Manager", type: "select", options: ["", "Ivan", "Hector"], optionLabels: { "": "— Unassigned —" } },
          { name: "web_status", label: "Web status", type: "select", options: WEB_STATUSES },
          { name: "client_status", label: "Client status", type: "select", options: CLIENT_STATUSES },
          { name: "motivation", label: "Motivation", type: "select", options: MOTIVATIONS },
        ],
      },
      {
        title: "Schedule Follow-up",
        desc: "Optional — date, time, and type. Leave blank to skip.",
        fields: [
          { name: "fu_date", label: "Date", type: "date" },
          { name: "fu_time", label: "Time", type: "time" },
          { name: "fu_type", label: "Type", type: "select", options: FOLLOW_UP_TYPES },
        ],
      },
      {
        title: "Notes",
        desc: "Add an initial note for the client and/or the website build. Both optional.",
        fields: [
          { name: "initial_client_note", label: "Client notes", type: "textarea", placeholder: "First impressions, relationship context, ..." },
          { name: "initial_web_note", label: "Web notes", type: "textarea", placeholder: "Tech stack preferences, design direction, ..." },
        ],
      },
      { title: "Review", desc: "Double-check before saving.", review: true },
    ];

    const wizardOverlay = document.getElementById("wizardOverlay");
    const stepMeta = document.getElementById("stepMeta");
    const stepBody = document.getElementById("stepBody");
    const progressBar = document.getElementById("progressBar");
    const backBtn = document.getElementById("backBtn");
    const nextBtn = document.getElementById("nextBtn");

    let stepIndex = 0;
    let formData = {};

    function openWizard() {
      stepIndex = 0;
      formData = { web_status: "Not Started", manager: "", client_status: "New Lead", motivation: "Not Set", fu_type: "Follow-up" };
      renderStep();
      wizardOverlay.classList.add("open");
    }
    function closeWizard() { wizardOverlay.classList.remove("open"); }

    function renderStep() {
      const step = wizardSteps[stepIndex];
      stepMeta.textContent = `Step ${stepIndex + 1} of ${wizardSteps.length}`;
      progressBar.style.width = `${((stepIndex + 1) / wizardSteps.length) * 100}%`;

      if (step.review) {
        stepBody.innerHTML = `<h2 class="step-title">${step.title}</h2><p class="step-desc">${step.desc}</p>${renderReview()}`;
      } else {
        const fieldsHtml = step.fields.map(renderField).join("");
        stepBody.innerHTML = `<h2 class="step-title">${step.title}</h2><p class="step-desc">${step.desc}</p>${fieldsHtml}<div class="field-error" id="stepError" style="display:none;"></div>`;
        const firstInput = stepBody.querySelector("input, select, textarea");
        if (firstInput) setTimeout(() => firstInput.focus(), 50);
      }
      backBtn.disabled = stepIndex === 0;
      nextBtn.textContent = stepIndex === wizardSteps.length - 1 ? "Save Client" : "Next";
    }

    function renderField(f) {
      const v = esc(formData[f.name] ?? "");
      if (f.type === "select") {
        const opts = f.options.map((o) => {
          const label = (f.optionLabels && f.optionLabels[o] != null) ? f.optionLabels[o] : o;
          return `<option value="${esc(o)}"${formData[f.name] === o ? " selected" : ""}>${esc(label)}</option>`;
        }).join("");
        return `<div class="field"><label>${esc(f.label)}</label><select name="${f.name}">${opts}</select></div>`;
      }
      if (f.type === "textarea") {
        return `<div class="field"><label>${esc(f.label)}</label><textarea name="${f.name}" placeholder="${esc(f.placeholder || "")}">${v}</textarea></div>`;
      }
      if (f.type === "datalist") {
        return `<div class="field"><label>${esc(f.label)}</label><input type="text" name="${f.name}" list="${esc(f.list)}" value="${v}" placeholder="${esc(f.placeholder || "")}"></div>`;
      }
      const extra =
        (f.maxlength ? ` maxlength="${f.maxlength}"` : "") +
        (f.inputmode ? ` inputmode="${esc(f.inputmode)}"` : "") +
        (f.autocomplete ? ` autocomplete="${esc(f.autocomplete)}"` : "");
      return `<div class="field"><label>${esc(f.label)}</label><input type="${esc(f.type || "text")}" name="${f.name}" value="${v}" placeholder="${esc(f.placeholder || "")}"${f.required ? " required" : ""}${extra}></div>`;
    }

    function renderReview() {
      const fuIso = formData.fu_date ? combineDateTime(formData.fu_date, formData.fu_time) : null;
      const rows = [
        ["Company", formData.company_name],
        ["Business Type", formData.business_type],
        ["Client", formData.client_name],
        ["Phone", formData.phone],
        ["Profile Link", formData.profile_link],
        ["Post Link", formData.post_link],
        ["Finished Website", formData.finished_website],
        ["Manager", formData.manager],
        ["Web Status", formData.web_status],
        ["Client Status", formData.client_status],
        ["Motivation", formData.motivation],
        ["Follow-up", fuIso ? `${formatDateTime(fuIso)} (${formData.fu_type || "Follow-up"})` : ""],
        ["Client Notes", formData.initial_client_note],
        ["Web Notes", formData.initial_web_note],
      ];
      return rows.map(([k, v]) => {
        const has = v && v.toString().trim();
        return `<div class="review-row"><div class="k">${k}</div><div class="v${has ? "" : " muted"}">${has ? esc(v) : "—"}</div></div>`;
      }).join("");
    }

    function collectStepData() {
      const step = wizardSteps[stepIndex];
      if (!step.fields) return;
      for (const f of step.fields) {
        const el = stepBody.querySelector(`[name="${f.name}"]`);
        if (el) formData[f.name] = el.value.trim();
      }
    }
    function showStepError(msg) {
      const el = document.getElementById("stepError");
      if (!el) { alert(msg); return; }
      el.textContent = msg;
      el.style.display = "block";
    }

    async function goNext() {
      const step = wizardSteps[stepIndex];
      if (!step.review) {
        collectStepData();
        for (const f of (step.fields || [])) {
          if (f.required && !formData[f.name]) { showStepError(`${f.label.replace(" *", "")} is required.`); return; }
        }
        if (step.validate) {
          nextBtn.disabled = true; nextBtn.textContent = "Checking...";
          const err = await step.validate(formData);
          nextBtn.disabled = false; nextBtn.textContent = stepIndex === wizardSteps.length - 1 ? "Save Client" : "Next";
          if (err) { showStepError(err); return; }
        }
      }
      if (stepIndex === wizardSteps.length - 1) { await submitWizard(); return; }
      stepIndex++;
      renderStep();
    }
    function goBack() {
      if (stepIndex === 0) return;
      collectStepData();
      stepIndex--;
      renderStep();
    }

    async function submitWizard() {
      nextBtn.disabled = true; nextBtn.textContent = "Saving...";
      const p = normPhone(formData.phone);
      if (p) {
        const existing = allClients.find((c) => normPhone(c.phone) === p);
        if (existing) {
          nextBtn.disabled = false; nextBtn.textContent = "Save Client";
          alert(`This contact already exists — registered under "${existing.company_name}".`);
          return;
        }
      }
      const fuIso = formData.fu_date ? combineDateTime(formData.fu_date, formData.fu_time) : null;
      const clientNotes = formData.initial_client_note ? appendNote([], formData.initial_client_note) : [];
      const webNotes = formData.initial_web_note ? appendNote([], formData.initial_web_note) : [];
      const row = {
        company_name: formData.company_name || null,
        business_type: formData.business_type || null,
        client_name: formData.client_name || null,
        phone: formData.phone || null,
        profile_link: formData.profile_link || null,
        post_link: formData.post_link || null,
        finished_website: formData.finished_website || null,
        manager: formData.manager || null,
        web_status: formData.web_status || "Not Started",
        client_status: formData.client_status || "New Lead",
        motivation: formData.motivation || "Not Set",
        follow_up_at: fuIso,
        follow_up_type: formData.fu_type || "Follow-up",
        client_notes: clientNotes,
        web_notes: webNotes,
      };
      const { error } = await sb.from("clients").insert(row);
      nextBtn.disabled = false; nextBtn.textContent = "Save Client";
      if (error) { alert("Insert failed: " + error.message); return; }
      closeWizard();
      load();
    }

    // ---------- Detail / Edit modal ----------
    const detailOverlay = document.getElementById("detailOverlay");
    const detailBody = document.getElementById("detailBody");
    const detailFooter = document.getElementById("detailFooter");
    const detailTitle = document.getElementById("detailTitle");

    let detailId = null;
    let detailMode = "view"; // view | edit
    let detailDraft = {};

    function openDetail(id) {
      detailId = id; detailMode = "view"; renderDetail();
      detailOverlay.classList.add("open");
    }
    function closeDetail() {
      detailOverlay.classList.remove("open");
      detailId = null; detailMode = "view"; detailDraft = {};
    }
    function getCurrentClient() { return allClients.find((c) => c.id === detailId); }

    function renderDetail() {
      const c = getCurrentClient();
      if (!c) { closeDetail(); return; }
      detailTitle.textContent = c.company_name || "Client Details";
      if (detailMode === "view") renderDetailView(c); else renderDetailEdit(c);
    }

    function renderNotesThread(notes) {
      const arr = Array.isArray(notes) ? notes : [];
      if (arr.length === 0) return '<div class="notes-thread empty">No notes yet</div>';
      // Oldest at top, newest at bottom
      return `<div class="notes-thread">${arr.map((n) => `
        <div class="note-entry">
          <div class="note-time">${esc(formatDateTime(n.at))}</div>
          <div class="note-text">${esc(n.text)}</div>
        </div>`).join("")}</div>`;
    }

    function renderFollowupBox(c) {
      const state = fupState(c.follow_up_at);
      const typeTag = `<span class="fup-type-tag ${fupTypeClass(c.follow_up_type)}">${esc(c.follow_up_type || "Follow-up")}</span>`;
      if (!c.follow_up_at) {
        return `
          <div class="followup-box">
            <div class="fup-text">
              <div class="fup-label2">Schedule</div>
              <div class="fup-value" style="color:#6b7280;">Not set</div>
            </div>
            <button class="ghost" id="addToCalendarBtn">📅 Add to Calendar</button>
          </div>`;
      }
      const isOverdue = state === "overdue";
      const isToday = state === "today";
      const note = isOverdue ? " (overdue)" : isToday ? " (today)" : "";
      return `
        <div class="followup-box${isOverdue ? " overdue" : ""}">
          <div class="fup-text">
            <div class="fup-label2">${esc(c.follow_up_type || "Follow-up")}</div>
            <div class="fup-value${isOverdue ? " overdue" : ""}">${esc(formatDateTime(c.follow_up_at))}${note} ${typeTag}</div>
          </div>
          <button id="viewOnCalendarBtn">📅 View on Calendar</button>
        </div>`;
    }

    function renderDetailView(c) {
      const linkAnchor = (u) => u ? `<a href="${esc(u)}" target="_blank" rel="noopener">${esc(u)}</a>` : '<span class="muted">—</span>';
      const val = (v) => (v && v.toString().trim()) ? `<div class="v">${esc(v)}</div>` : `<div class="v muted">—</div>`;

      detailBody.innerHTML = `
        <div class="detail-grid">
          <div class="detail-item"><div class="k">Company</div>${val(c.company_name)}</div>

          <div class="detail-item detail-full"><div class="k">Finished Website</div><div class="v">${linkAnchor(c.finished_website)}</div></div>

          <div class="detail-item"><div class="k">Client Status</div><div class="v"><span class="badge ${csClass(c.client_status)}">${esc(c.client_status || "New Lead")}</span></div></div>
          <div class="detail-item"><div class="k">Motivation</div><div class="v"><span class="badge ${moClass(c.motivation)}">${esc(c.motivation || "Not Set")}</span></div></div>

    function renderDetailEdit(c) {
      const d = detailDraft;
      const managerOpts = ["", "Ivan", "Hector"].map((o) =>
        `<option value="${esc(o)}"${(d.manager || "") === o ? " selected" : ""}>${o || "— Unassigned —"}</option>`

      const wsOpts = WEB_STATUSES.map((o) => `<option value="${esc(o)}"${(d.web_status || "Not Started") === o ? " selected" : ""}>${o}</option>`).join("");
      const csOpts = CLIENT_STATUSES.map((o) => `<option value="${esc(o)}"${(d.client_status || "New Lead") === o ? " selected" : ""}>${o}</option>`).join("");
      const moOpts = MOTIVATIONS.map((o) => `<option value="${esc(o)}"${(d.motivation || "Not Set") === o ? " selected" : ""}>${o}</option>`).join("");
      const fuTypeOpts = FOLLOW_UP_TYPES.map((o) => `<option value="${esc(o)}"${(d.follow_up_type || "Follow-up") === o ? " selected" : ""}>${o}</option>`).join("");
      const { date: fuDate, time: fuTime } = splitDateTime(d.follow_up_at);

      detailBody.innerHTML = `
        <div style="padding: 16px 20px;">
          <div class="field"><label>Company name *</label><input name="company_name" value="${esc(d.company_name)}" required></div>
          <div class="field"><label>Business type</label><input name="business_type" list="business_types" value="${esc(d.business_type)}"></div>
          <div class="field"><label>Client name</label><input name="client_name" value="${esc(d.client_name)}"></div>
          <div class="field"><label>Phone</label><input name="phone" type="tel" value="${esc(displayPhone(d.phone))}" placeholder="(555) 123-4567" maxlength="14" inputmode="numeric" autocomplete="tel-national"></div>
          <div class="field"><label>Profile link</label><input name="profile_link" type="url" value="${esc(d.profile_link)}" placeholder="https://..."></div>
          <div class="field"><label>Post link</label><input name="post_link" type="url" value="${esc(d.post_link)}" placeholder="https://..."></div>
          <div class="field"><label>Finished website</label><input name="finished_website" type="url" value="${esc(d.finished_website)}" placeholder="https://..."></div>
          <div class="field"><label>Manager</label><select name="manager">${managerOpts}</select></div>
          <div class="field"><label>Web status</label><select name="web_status">${wsOpts}</select></div>
          <div class="field"><label>Client status</label><select name="client_status">${csOpts}</select></div>
          <div class="field"><label>Motivation</label><select name="motivation">${moOpts}</select></div>
          <div class="field-row">
            <div class="field"><label>Follow-up date</label><input name="fu_date" type="date" value="${esc(fuDate)}"></div>
            <div class="field"><label>Follow-up time</label><input name="fu_time" type="time" value="${esc(fuTime)}"></div>
          </div>
          <div class="field"><label>Follow-up type</label><select name="follow_up_type">${fuTypeOpts}</select></div>

          <h4 style="font-size:13px;text-transform:uppercase;letter-spacing:0.04em;color:#6b7280;margin:18px 0 6px;">Client Notes (last ${NOTE_CAP})</h4>
          ${renderNotesThread(d.client_notes)}
          <div class="new-note-box">
            <textarea name="new_client_note" placeholder="Add a new client note (leaves an entry with today's timestamp)..."></textarea>
            <div class="hint">Oldest entry auto-drops when you hit ${NOTE_CAP + 1}.</div>
          </div>

          <h4 style="font-size:13px;text-transform:uppercase;letter-spacing:0.04em;color:#6b7280;margin:18px 0 6px;">Web Notes (last ${NOTE_CAP})</h4>
          ${renderNotesThread(d.web_notes)}
          <div class="new-note-box">
            <textarea name="new_web_note" placeholder="Add a new web/build note..."></textarea>
          </div>

          <div class="field-error" id="detailError" style="display:none;margin-top:12px;"></div>
        </div>`;

      detailFooter.innerHTML = `<button class="ghost" id="cancelEditBtn">Cancel</button><button id="saveEditBtn">Save changes</button>`;
      document.getElementById("cancelEditBtn").addEventListener("click", () => { detailMode = "view"; renderDetail(); });
      document.getElementById("saveEditBtn").addEventListener("click", saveEdit);
    }

    async function saveEdit() {
      const get = (name) => {
        const el = detailBody.querySelector(`[name="${name}"]`);
        return el ? el.value.trim() : "";
      };
      const update = {
        company_name: get("company_name") || null,
        business_type: get("business_type") || null,
        client_name: get("client_name") || null,
        phone: get("phone") || null,
        profile_link: get("profile_link") || null,
        post_link: get("post_link") || null,
        finished_website: get("finished_website") || null,
        manager: get("manager") || null,
        web_status: get("web_status") || "Not Started",
        client_status: get("client_status") || "New Lead",
        motivation: get("motivation") || "Not Set",
        follow_up_type: get("follow_up_type") || "Follow-up",
      };
      const fuDate = get("fu_date");
      const fuTime = get("fu_time");
      update.follow_up_at = fuDate ? combineDateTime(fuDate, fuTime) : null;

      if (!update.company_name) {
        const err = document.getElementById("detailError");
        err.textContent = "Company name is required."; err.style.display = "block"; return;
      }

      const p = normPhone(update.phone);
      if (p) {
        const existing = allClients.find((c) => c.id !== detailId && normPhone(c.phone) === p);
        if (existing) {
          const err = document.getElementById("detailError");
          err.textContent = `This phone is already registered under "${existing.company_name}".`;
          err.style.display = "block"; return;
        }
      }

      // Notes: append new entries if any
      const current = getCurrentClient() || {};
      const newClientNote = get("new_client_note");
      const newWebNote = get("new_web_note");
      update.client_notes = newClientNote ? appendNote(current.client_notes, newClientNote) : trimNotes(current.client_notes);
      update.web_notes = newWebNote ? appendNote(current.web_notes, newWebNote) : trimNotes(current.web_notes);

      const saveBtn = document.getElementById("saveEditBtn");
      saveBtn.disabled = true; saveBtn.textContent = "Saving...";
      const { error } = await sb.from("clients").update(update).eq("id", detailId);
      saveBtn.disabled = false; saveBtn.textContent = "Save changes";
      if (error) {
        const err = document.getElementById("detailError");
        err.textContent = "Save failed: " + error.message; err.style.display = "block"; return;
      }
      await load();
      detailMode = "view";
      renderDetail();
    }

    // ---------- Schedule mini-wizard (date -> time -> type) ----------
    const scheduleOverlay = document.getElementById("scheduleOverlay");
    const scheduleMeta = document.getElementById("scheduleMeta");
    const scheduleBody = document.getElementById("scheduleBody");
    const scheduleProgress = document.getElementById("scheduleProgress");
    const scheduleBack = document.getElementById("scheduleBack");
    const scheduleNext = document.getElementById("scheduleNext");

    let scheduleClientId = null;
    let scheduleStep = 0;
    let scheduleData = { date: "", time: "09:00", type: "Follow-up" };

    function openSchedule(clientId) {
      scheduleClientId = clientId;
      scheduleStep = 0;
      const c = allClients.find((x) => x.id === clientId);
      const parts = splitDateTime(c && c.follow_up_at);
      scheduleData = { date: parts.date || "", time: parts.time || "09:00", type: (c && c.follow_up_type) || "Follow-up" };
      // Close detail modal so they're focused on scheduling; reopen after save.
      detailOverlay.classList.remove("open");
      renderScheduleStep();
      scheduleOverlay.classList.add("open");
    }
    function closeSchedule() { scheduleOverlay.classList.remove("open"); }

    function renderScheduleStep() {
      scheduleMeta.textContent = `Step ${scheduleStep + 1} of 3`;
      scheduleProgress.style.width = `${((scheduleStep + 1) / 3) * 100}%`;
      if (scheduleStep === 0) {
        scheduleBody.innerHTML = `
          <h2 class="step-title">Pick a date</h2>
          <p class="step-desc">Which day should this be scheduled for?</p>
          <div class="field"><label>Date</label><input id="s_date" type="date" value="${esc(scheduleData.date)}"></div>`;
        setTimeout(() => document.getElementById("s_date").focus(), 50);
      } else if (scheduleStep === 1) {
        scheduleBody.innerHTML = `
          <h2 class="step-title">Pick a time</h2>
          <p class="step-desc">What time of day?</p>
          <div class="field"><label>Time</label><input id="s_time" type="time" value="${esc(scheduleData.time)}"></div>`;
        setTimeout(() => document.getElementById("s_time").focus(), 50);
      } else {
        const opts = FOLLOW_UP_TYPES.map((o) => `<option value="${esc(o)}"${scheduleData.type === o ? " selected" : ""}>${o}</option>`).join("");
        scheduleBody.innerHTML = `
          <h2 class="step-title">What kind?</h2>
          <p class="step-desc">Follow-up is a casual check-in. Appointment is a firm commitment.</p>
          <div class="field"><label>Type</label><select id="s_type">${opts}</select></div>`;
      }
      scheduleBack.disabled = scheduleStep === 0;
      scheduleNext.textContent = scheduleStep === 2 ? "Save" : "Next";
    }

    async function scheduleGoNext() {
      if (scheduleStep === 0) {
        const v = document.getElementById("s_date").value;
        if (!v) { alert("Pick a date first."); return; }
        scheduleData.date = v;
        scheduleStep = 1; renderScheduleStep(); return;
      }
      if (scheduleStep === 1) {
        scheduleData.time = document.getElementById("s_time").value || "09:00";
        scheduleStep = 2; renderScheduleStep(); return;
      }
      scheduleData.type = document.getElementById("s_type").value || "Follow-up";
      const fuIso = combineDateTime(scheduleData.date, scheduleData.time);
      scheduleNext.disabled = true; scheduleNext.textContent = "Saving...";
      const { error } = await sb.from("clients")
        .update({ follow_up_at: fuIso, follow_up_type: scheduleData.type })
        .eq("id", scheduleClientId);
      scheduleNext.disabled = false; scheduleNext.textContent = "Save";
      if (error) { alert("Save failed: " + error.message); return; }
      closeSchedule();
      const id = scheduleClientId;
      await load();
      // Reopen detail to show the new schedule
      openDetail(id);
    }
    function scheduleGoBack() {
      if (scheduleStep === 0) return;
      if (scheduleStep === 1) scheduleData.date = document.getElementById("s_date")?.value || scheduleData.date;
      if (scheduleStep === 2) scheduleData.time = document.getElementById("s_time")?.value || scheduleData.time;
      scheduleStep--; renderScheduleStep();
    }

    // ---------- Filter modal ----------
    const filterOverlay = document.getElementById("filterOverlay");

    function populateFilterModalOptions() {
      const btSelect = document.getElementById("f_business_type");
      const types = Array.from(new Set(allClients.map((c) => c.business_type).filter(Boolean))).sort();
      btSelect.innerHTML = `<option value="">Any</option>` + types.map((t) => `<option value="${esc(t)}">${esc(t)}</option>`).join("");
      document.getElementById("f_web_status").innerHTML = `<option value="">Any</option>` + WEB_STATUSES.map((o) => `<option value="${esc(o)}">${esc(o)}</option>`).join("");
      document.getElementById("f_client_status").innerHTML = `<option value="">Any</option>` + CLIENT_STATUSES.map((o) => `<option value="${esc(o)}">${esc(o)}</option>`).join("");
      document.getElementById("f_motivation").innerHTML = `<option value="">Any</option>` + MOTIVATIONS.map((o) => `<option value="${esc(o)}">${esc(o)}</option>`).join("");
    }

    function openFilterModal() {
      document.getElementById("f_business_type").value = filters.business_type;
      document.getElementById("f_manager").value = filters.manager;
      document.getElementById("f_web_status").value = filters.web_status;
      document.getElementById("f_client_status").value = filters.client_status;
      document.getElementById("f_motivation").value = filters.motivation;
      document.getElementById("f_followup").value = filters.followup;
      filterOverlay.classList.add("open");
    }
    function closeFilterModal() { filterOverlay.classList.remove("open"); }

    function applyFilterFromModal() {
      filters = {
        business_type: document.getElementById("f_business_type").value,
        manager: document.getElementById("f_manager").value,
        web_status: document.getElementById("f_web_status").value,
        client_status: document.getElementById("f_client_status").value,
        motivation: document.getElementById("f_motivation").value,
        followup: document.getElementById("f_followup").value,
      };
      closeFilterModal();
      render();
      refreshCalendar();
    }
    function resetFiltersModal() {
      document.getElementById("f_business_type").value = "";
      document.getElementById("f_manager").value = "";
      document.getElementById("f_web_status").value = "";
      document.getElementById("f_client_status").value = "";
      document.getElementById("f_motivation").value = "";
      document.getElementById("f_followup").value = "";
    }
    function clearAllFilters() {
      filters = { ...DEFAULT_FILTERS };
      render();
      refreshCalendar();
    }

    // ---------- Tabs + Calendar ----------
    let calendarInstance = null;

    function switchTab(name) {
      document.querySelectorAll(".tab").forEach((t) => t.classList.toggle("active", t.dataset.view === name));
      document.querySelectorAll(".tab-content").forEach((t) => t.classList.toggle("active", t.dataset.view === name));
      if (name === "calendar") {
        initCalendar();
        setTimeout(() => { if (calendarInstance) calendarInstance.updateSize(); }, 50);
      }
    }

    function buildCalendarEvents() {
      const visible = applyFiltersToClients(allClients);
      return visible
        .filter((c) => c.follow_up_at)
        .map((c) => {
          const state = fupState(c.follow_up_at);
          const isAppt = c.follow_up_type === "Appointment";
          const color = state === "overdue" ? "#dc2626" : (isAppt ? "#f97316" : "#3b82f6");
          const prefix = isAppt ? "📞 " : "";
          return {
            id: c.id,
            title: prefix + (c.company_name || "(no name)"),
            start: c.follow_up_at,
            allDay: false,
            color,
          };
        });
    }

    function initCalendar() {
      if (calendarInstance) return;
      const el = document.getElementById("calendar");
      calendarInstance = new FullCalendar.Calendar(el, {
        initialView: "dayGridMonth",
        headerToolbar: {
          left: "prev,next today",
          center: "title",
          right: "dayGridMonth,timeGridWeek,timeGridDay,listWeek",
        },
        height: "auto",
        events: buildCalendarEvents(),
        eventClick: (info) => { info.jsEvent.preventDefault(); openDetail(info.event.id); },
      });
      calendarInstance.render();
    }
    function refreshCalendar() {
      if (!calendarInstance) return;
      const events = buildCalendarEvents();
      calendarInstance.removeAllEvents();
      events.forEach((e) => calendarInstance.addEvent(e));
    }

    // ---------- Wire up ----------
    document.querySelectorAll(".tab").forEach((t) => t.addEventListener("click", () => switchTab(t.dataset.view)));

    document.getElementById("openWizard").addEventListener("click", openWizard);
    document.getElementById("closeWizard").addEventListener("click", closeWizard);
    wizardOverlay.addEventListener("click", (e) => { if (e.target === wizardOverlay) closeWizard(); });
    backBtn.addEventListener("click", goBack);
    nextBtn.addEventListener("click", goNext);

    document.getElementById("closeDetail").addEventListener("click", closeDetail);
    detailOverlay.addEventListener("click", (e) => { if (e.target === detailOverlay) closeDetail(); });

    document.getElementById("closeSchedule").addEventListener("click", closeSchedule);
    scheduleOverlay.addEventListener("click", (e) => { if (e.target === scheduleOverlay) closeSchedule(); });
    scheduleBack.addEventListener("click", scheduleGoBack);
    scheduleNext.addEventListener("click", scheduleGoNext);

    document.getElementById("openFilters").addEventListener("click", openFilterModal);
    document.getElementById("closeFilter").addEventListener("click", closeFilterModal);
    filterOverlay.addEventListener("click", (e) => { if (e.target === filterOverlay) closeFilterModal(); });
    document.getElementById("filterApply").addEventListener("click", applyFilterFromModal);
    document.getElementById("filterReset").addEventListener("click", resetFiltersModal);
    document.getElementById("clearFilters").addEventListener("click", clearAllFilters);

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        if (scheduleOverlay.classList.contains("open")) closeSchedule();
        else if (filterOverlay.classList.contains("open")) closeFilterModal();
        else if (wizardOverlay.classList.contains("open")) closeWizard();
        else if (detailOverlay.classList.contains("open")) closeDetail();
      }
      if (e.key === "Enter" && wizardOverlay.classList.contains("open") && e.target.tagName !== "TEXTAREA") {
        e.preventDefault(); goNext();
      }
    });

    load();
  </script>
</body>
</html>
