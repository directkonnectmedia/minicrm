<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini CRM</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f6f7f9;
      color: #1a1a1a;
    }
    h1 { margin: 0 0 4px; font-size: 24px; }
    .sub { color: #666; margin-bottom: 24px; font-size: 14px; }
    .header-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 12px; flex-wrap: wrap; }
    .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }
    button {
      padding: 8px 14px;
      background: #111827;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background: #374151; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.ghost { background: transparent; color: #374151; border: 1px solid #d1d5db; }
    button.ghost:hover { background: #f3f4f6; }
    button.danger { background: #dc2626; }
    button.danger:hover { background: #b91c1c; }
    button.primary-lg { font-size: 15px; padding: 10px 18px; }
    button.outline { background: #fff; color: #111827; border: 1px solid #d1d5db; }
    button.outline:hover { background: #f9fafb; }

    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td {
      text-align: left;
      padding: 12px 10px;
      border-bottom: 1px solid #e5e7eb;
      vertical-align: middle;
    }
    th { font-weight: 600; color: #555; background: #f9fafb; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
    tbody tr { cursor: pointer; transition: background 120ms; }
    tbody tr:hover { background: #f9fafb; }
    td.truncate { max-width: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    td.actions { white-space: nowrap; text-align: right; }

    .badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 500; }

    /* Web status */
    .ws-NotStarted   { background: #f3f4f6; color: #4b5563; }
    .ws-InProgress   { background: #dbeafe; color: #1e40af; }
    .ws-Review       { background: #fef3c7; color: #92400e; }
    .ws-NeedsFixing  { background: #fee2e2; color: #991b1b; }
    .ws-Finished     { background: #d1fae5; color: #065f46; }

    /* Client status */
    .cs-NewLead        { background: #dbeafe; color: #1e40af; }
    .cs-Contacted      { background: #ccfbf1; color: #115e59; }
    .cs-Interested     { background: #ede9fe; color: #5b21b6; }
    .cs-ProposalSent   { background: #fed7aa; color: #9a3412; }
    .cs-Negotiation    { background: #e0e7ff; color: #3730a3; }
    .cs-FollowUp       { background: #fef3c7; color: #92400e; }
    .cs-ClosedWon      { background: #d1fae5; color: #065f46; }
    .cs-ClosedLost     { background: #fee2e2; color: #991b1b; }
    .cs-Nurture        { background: #f3f4f6; color: #4b5563; }

    /* Motivation */
    .mo-NotSet { background: #f3f4f6; color: #6b7280; }
    .mo-Dead   { background: #1f2937; color: #f9fafb; }
    .mo-Cold   { background: #dbeafe; color: #1e40af; }
    .mo-Warm   { background: #fed7aa; color: #9a3412; }
    .mo-Hot    { background: #fee2e2; color: #991b1b; }
    .mo-VIP    { background: #fef9c3; color: #854d0e; border: 1px solid #eab308; }

    .empty { text-align: center; color: #999; padding: 32px; font-size: 14px; }
    .error { background: #fee2e2; color: #991b1b; padding: 12px; border-radius: 6px; margin-bottom: 16px; font-size: 14px; }
    a { color: #2563eb; }
    a.web-link { font-size: 13px; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 12px; border-bottom: 1px solid #e5e7eb; }
    .tab {
      background: transparent; color: #6b7280; border: none; border-bottom: 2px solid transparent;
      padding: 8px 14px; font-size: 14px; font-weight: 500; cursor: pointer; border-radius: 0;
    }
    .tab:hover { background: #f3f4f6; color: #1f2937; }
    .tab.active { color: #111827; border-bottom-color: #111827; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Overdue */
    .overdue-banner {
      background: #fee2e2; color: #991b1b; padding: 10px 14px; border-radius: 8px;
      margin-bottom: 12px; font-size: 14px; font-weight: 500; display: none;
    }
    .overdue-banner.show { display: block; }
    tr.row-overdue { background: #fef2f2; }
    tr.row-overdue:hover { background: #fee2e2; }
    .badge.overdue { background: #dc2626; color: white; margin-left: 6px; font-size: 10px; }
    .badge.due-today { background: #f59e0b; color: white; margin-left: 6px; font-size: 10px; }

    /* Active filter chips */
    .filter-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .filter-chip {
      background: #eef2ff; color: #3730a3; border: 1px solid #c7d2fe;
      padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 500;
    }

    /* Calendar */
    #calendar { min-height: 600px; }
    .fc .fc-toolbar-title { font-size: 1.2em !important; }
    .fc-event { cursor: pointer; }

    .fup-type-tag { display: inline-block; padding: 1px 8px; border-radius: 999px; font-size: 11px; font-weight: 500; margin-left: 6px; }
    .fup-type-Followup    { background: #dbeafe; color: #1e40af; }
    .fup-type-Appointment { background: #fed7aa; color: #9a3412; }

    /* Modals (shared) */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(17, 24, 39, 0.5);
      display: none;
      align-items: center; justify-content: center;
      z-index: 1000;
      padding: 16px;
    }
    .overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 12px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-height: 90vh;
    }
    .modal-wide { max-width: 920px; }
    .modal-header {
      padding: 14px 18px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-title { font-size: 16px; font-weight: 600; }
    .modal-close {
      background: transparent; color: #6b7280; border: none;
      font-size: 22px; padding: 4px 8px; line-height: 1;
    }
    .modal-close:hover { background: #f3f4f6; }
    .modal-footer {
      padding: 14px 20px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      background: #f9fafb;
    }
    .step-meta { padding: 16px 20px 4px; color: #6b7280; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
    .step-body { padding: 4px 20px 16px; overflow-y: auto; flex: 1; }
    .step-title { font-size: 18px; font-weight: 600; margin: 0 0 6px; }
    .step-desc { color: #6b7280; font-size: 14px; margin: 0 0 16px; }
    .progress { height: 4px; background: #e5e7eb; }
    .progress-bar { height: 100%; background: #111827; transition: width 200ms ease; }

    /* Wizard fields */
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; color: #374151; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 10px 12px;
      border: 1px solid #d1d5db; border-radius: 6px;
      font-size: 14px; font-family: inherit;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      outline: none; border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }
    .field textarea { min-height: 80px; resize: vertical; }
    .field-error {
      color: #991b1b; font-size: 13px; background: #fee2e2;
      padding: 8px 10px; border-radius: 6px; margin-top: 8px;
    }

    /* === PROFILE LAYOUT === */
    .profile-layout {
      display: grid;
      grid-template-columns: 32% 68%;
      height: 70vh;
      min-height: 480px;
      overflow: hidden;
    }
    @media (max-width: 720px) {
      .profile-layout { grid-template-columns: 1fr; height: auto; max-height: 80vh; overflow-y: auto; }
    }

    /* Notes panel (left) */
    .profile-notes {
      display: flex; flex-direction: column;
      border-right: 1px solid #e5e7eb;
      background: #f9fafb;
      overflow: hidden;
    }
    .notes-toggle { display: flex; border-bottom: 1px solid #e5e7eb; background: #fff; }
    .notes-toggle button {
      flex: 1; background: transparent; color: #6b7280;
      border: none; border-bottom: 3px solid transparent;
      padding: 11px 8px; font-size: 13px; font-weight: 500;
      cursor: pointer; border-radius: 0;
    }
    .notes-toggle button:hover { background: #f3f4f6; color: #1f2937; }
    .notes-toggle button.active.client-tab { color: #1e40af; border-bottom-color: #3b82f6; background: #eff6ff; }
    .notes-toggle button.active.web-tab    { color: #065f46; border-bottom-color: #10b981; background: #ecfdf5; }
    .notes-thread {
      flex: 1; overflow-y: auto; padding: 12px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .notes-thread.empty {
      color: #9ca3af; font-style: italic; text-align: center;
      padding: 32px 8px; font-size: 13px;
      align-items: center; justify-content: center;
    }
    .bubble-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; max-width: 88%; align-self: flex-end; }
    .bubble {
      padding: 8px 12px; border-radius: 16px;
      font-size: 13px; word-break: break-word; white-space: pre-wrap;
      line-height: 1.35;
    }
    .bubble-client { background: #3b82f6; color: white; border-bottom-right-radius: 4px; }
    .bubble-web    { background: #10b981; color: white; border-bottom-right-radius: 4px; }
    .bubble-time { font-size: 10px; color: #9ca3af; padding: 0 6px; }
    .notes-input-bar {
      border-top: 1px solid #e5e7eb;
      padding: 10px; background: #fff;
      display: flex; gap: 6px; align-items: flex-end;
    }
    .notes-input-bar textarea {
      flex: 1; padding: 8px 12px;
      border: 1px solid #d1d5db; border-radius: 18px;
      font-size: 13px; font-family: inherit; resize: none;
      min-height: 36px; max-height: 90px;
    }
    .notes-input-bar textarea:focus { outline: none; border-color: #6366f1; }
    .notes-input-bar button { padding: 8px 14px; font-size: 13px; border-radius: 18px; }
    .notes-cap-hint { font-size: 10px; color: #9ca3af; padding: 4px 12px 6px; text-align: center; background: #fff; border-top: 1px solid #f3f4f6; }

    /* Right panel */
    .profile-right { display: flex; flex-direction: column; overflow: hidden; }
    .right-tabs { display: flex; border-bottom: 1px solid #e5e7eb; background: #f9fafb; }
    .right-tabs button {
      background: transparent; color: #6b7280;
      border: none; border-bottom: 2px solid transparent;
      padding: 12px 18px; font-size: 13px; font-weight: 500;
      cursor: pointer; border-radius: 0;
    }
    .right-tabs button:hover { color: #1f2937; background: #fff; }
    .right-tabs button.active { color: #111827; border-bottom-color: #111827; background: #fff; }
    .right-content { flex: 1; overflow-y: auto; padding: 18px 20px; }

    /* Info rows */
    .info-row {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 0; border-bottom: 1px solid #f3f4f6;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
      color: #6b7280; font-weight: 600; width: 100px; flex-shrink: 0;
    }
    .info-value { flex: 1; font-size: 14px; color: #1f2937; word-break: break-word; min-width: 0; }
    .info-value.muted { color: #9ca3af; font-style: italic; }
    .info-value a { font-size: 13px; }
    .row-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .icon-btn {
      background: #fff; border: 1px solid #e5e7eb; color: #6b7280;
      padding: 4px 8px; border-radius: 6px; cursor: pointer;
      font-size: 13px; line-height: 1;
    }
    .icon-btn:hover { background: #f3f4f6; color: #1f2937; border-color: #d1d5db; }
    .icon-btn.copied { background: #d1fae5; color: #065f46; border-color: #6ee7b7; }
    .inline-edit-row { display: flex; gap: 4px; flex: 1; min-width: 0; }
    .inline-edit-row input {
      flex: 1; min-width: 0; padding: 6px 10px;
      border: 1px solid #6366f1; border-radius: 6px;
      font-size: 14px; font-family: inherit;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }

    /* Field block (right panel section) */
    .field-block { margin-bottom: 22px; }
    .field-block-title {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
      color: #6b7280; font-weight: 600; margin-bottom: 8px;
    }

    /* Pills */
    .pill-bar { display: flex; flex-wrap: wrap; gap: 6px; }
    .pill {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      background: #f3f4f6;
      color: #4b5563;
      border: 2px solid #d1d5db;
      transition: all 120ms ease;
      user-select: none;
    }
    .pill:hover { background: #e5e7eb; }

    /* Web Status pills */
    .pill.p-ws-NotStarted   { border-color: #6b7280; }
    .pill.p-ws-NotStarted.active   { background: #6b7280; color: white; }
    .pill.p-ws-InProgress   { border-color: #3b82f6; }
    .pill.p-ws-InProgress.active   { background: #3b82f6; color: white; }
    .pill.p-ws-Review       { border-color: #f59e0b; }
    .pill.p-ws-Review.active       { background: #f59e0b; color: white; }
    .pill.p-ws-NeedsFixing  { border-color: #dc2626; }
    .pill.p-ws-NeedsFixing.active  { background: #dc2626; color: white; }
    .pill.p-ws-Finished     { border-color: #10b981; }
    .pill.p-ws-Finished.active     { background: #10b981; color: white; }

    /* Client Status pills */
    .pill.p-cs-NewLead      { border-color: #3b82f6; }
    .pill.p-cs-NewLead.active      { background: #3b82f6; color: white; }
    .pill.p-cs-Contacted    { border-color: #14b8a6; }
    .pill.p-cs-Contacted.active    { background: #14b8a6; color: white; }
    .pill.p-cs-Interested   { border-color: #8b5cf6; }
    .pill.p-cs-Interested.active   { background: #8b5cf6; color: white; }
    .pill.p-cs-ProposalSent { border-color: #f97316; }
    .pill.p-cs-ProposalSent.active { background: #f97316; color: white; }
    .pill.p-cs-Negotiation  { border-color: #6366f1; }
    .pill.p-cs-Negotiation.active  { background: #6366f1; color: white; }
    .pill.p-cs-FollowUp     { border-color: #f59e0b; }
    .pill.p-cs-FollowUp.active     { background: #f59e0b; color: white; }
    .pill.p-cs-ClosedWon    { border-color: #10b981; }
    .pill.p-cs-ClosedWon.active    { background: #10b981; color: white; }
    .pill.p-cs-ClosedLost   { border-color: #dc2626; }
    .pill.p-cs-ClosedLost.active   { background: #dc2626; color: white; }
    .pill.p-cs-Nurture      { border-color: #6b7280; }
    .pill.p-cs-Nurture.active      { background: #6b7280; color: white; }

    /* Motivation pills */
    .pill.p-mo-NotSet { border-color: #9ca3af; }
    .pill.p-mo-NotSet.active { background: #6b7280; color: white; }
    .pill.p-mo-Dead   { border-color: #1f2937; }
    .pill.p-mo-Dead.active   { background: #1f2937; color: white; }
    .pill.p-mo-Cold   { border-color: #3b82f6; }
    .pill.p-mo-Cold.active   { background: #3b82f6; color: white; }
    .pill.p-mo-Warm   { border-color: #f97316; }
    .pill.p-mo-Warm.active   { background: #f97316; color: white; }
    .pill.p-mo-Hot    { border-color: #dc2626; }
    .pill.p-mo-Hot.active    { background: #dc2626; color: white; }
    .pill.p-mo-VIP    { border-color: #eab308; }
    .pill.p-mo-VIP.active    { background: #eab308; color: white; }

    /* Manager pills */
    .pill.p-mgr-Unassigned { border-color: #9ca3af; }
    .pill.p-mgr-Unassigned.active { background: #6b7280; color: white; }
    .pill.p-mgr-Ivan   { border-color: #3b82f6; }
    .pill.p-mgr-Ivan.active   { background: #3b82f6; color: white; }
    .pill.p-mgr-Hector { border-color: #8b5cf6; }
    .pill.p-mgr-Hector.active { background: #8b5cf6; color: white; }

    /* Schedule type pills */
    .pill.p-fut-Followup    { border-color: #3b82f6; }
    .pill.p-fut-Followup.active    { background: #3b82f6; color: white; }
    .pill.p-fut-Appointment { border-color: #f97316; }
    .pill.p-fut-Appointment.active { background: #f97316; color: white; }

    /* Schedule block */
    .schedule-block {
      background: #f9fafb; border: 1px solid #e5e7eb;
      border-radius: 8px; padding: 14px;
    }
    .schedule-block.overdue { background: #fef2f2; border-color: #fecaca; }
    .schedule-current {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; flex-wrap: wrap;
    }
    .source-of-truth { font-size: 14px; font-weight: 500; color: #1f2937; }
    .source-of-truth.overdue { color: #991b1b; }
    .source-of-truth.empty { color: #6b7280; font-style: italic; font-weight: normal; }
    .schedule-edit-menu {
      margin-top: 12px; display: flex; gap: 8px;
      border-top: 1px solid #e5e7eb; padding-top: 12px;
    }
    .schedule-form { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
    .schedule-form .date-time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .schedule-form input[type="date"], .schedule-form input[type="time"] {
      padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 6px;
      font-size: 14px; font-family: inherit; width: 100%;
    }
    .schedule-form .form-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 4px; }

    /* Review (wizard) */
    .review-row {
      display: grid; grid-template-columns: 140px 1fr;
      gap: 8px; padding: 8px 0; border-bottom: 1px solid #f3f4f6; font-size: 14px;
    }
    .review-row:last-child { border-bottom: none; }
    .review-row .k { color: #6b7280; font-weight: 500; }
    .review-row .v { color: #1f2937; word-break: break-word; }
    .review-row .v.muted { color: #9ca3af; font-style: italic; }
  </style>
</head>
<body>
  <div class="header-bar">
    <div>
      <h1>Mini CRM</h1>
      <div class="sub">Hello Mini CRM</div>
    </div>
    <div class="header-actions">
      <button class="primary-lg" id="openWizard">+ Add New Client</button>
      <button class="outline" id="openFilters">🔎 Apply Filters</button>
      <button class="ghost" id="clearFilters" style="display:none;">✕ Clear All Filters</button>
    </div>
  </div>

  <div id="configError" class="error" style="display:none;"></div>

  <datalist id="business_types">
    <option value="Appliance Repair"><option value="Auto Detailing"><option value="Bathroom Remodeling">
    <option value="Carpentry"><option value="Carpet Cleaning"><option value="Chimney Sweep">
    <option value="Cleaning - Commercial"><option value="Cleaning - Residential"><option value="Commercial Construction">
    <option value="Concrete"><option value="Decks"><option value="Demolition">
    <option value="Drywall"><option value="Electrical"><option value="Epoxy Flooring">
    <option value="Excavation"><option value="Fencing"><option value="Flooring">
    <option value="Foundation Repair"><option value="Garage Door"><option value="General Contractor">
    <option value="Gutters"><option value="Handyman"><option value="HVAC">
    <option value="Insulation"><option value="Irrigation"><option value="Junk Removal">
    <option value="Kitchen Remodeling"><option value="Landscaping"><option value="Lawn Care">
    <option value="Locksmith"><option value="Marketing Agency"><option value="Masonry">
    <option value="Mobile Car Wash"><option value="Moving Services"><option value="Painting - Exterior">
    <option value="Painting - Interior"><option value="Pavers"><option value="Pest Control">
    <option value="Photography"><option value="Plumbing"><option value="Pool Installation">
    <option value="Pool Service"><option value="Pressure Washing"><option value="Real Estate">
    <option value="Remodeling"><option value="Roofing"><option value="Septic">
    <option value="Siding"><option value="Snow Removal"><option value="Solar Installation">
    <option value="Stucco"><option value="Tree Service"><option value="Waterproofing">
    <option value="Web Design"><option value="Welding"><option value="Window Cleaning">
    <option value="Window Installation">
  </datalist>

  <div class="tabs">
    <button class="tab active" data-view="list">📋 List</button>
    <button class="tab" data-view="calendar">📅 Calendar</button>
  </div>

  <div id="filterChips" class="filter-chips"></div>

  <div class="tab-content active" data-view="list">
    <div id="overdueBanner" class="overdue-banner"></div>
    <div class="card">
      <table>
        <thead>

  <script>
    const SUPABASE_URL = "https://ljghuyeugzmduzzvngkc.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxqZ2h1eWV1Z3ptZHV6enZuZ2tjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTIzOTIsImV4cCI6MjA5MjI4ODM5Mn0.aoeOD1Xvm_q_ZYlJ_x72J_WvmODkwvbNQ7dwbCa5bTY";

    // ---- Constants ----

    // ---- Helpers ----
    const esc = (s) => (s ?? "").toString().replace(/[&<>"']/g, (c) => (
      { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]

    const wsClass = (s) => "ws-" + (s || "Not Started").replace(/\s/g, "");

    const moClass = (s) => "mo-" + (s || "Not Set").replace(/\s/g, "");
    const normPhone = (s) => (s || "").replace(/\D+/g, "");
    const fupTypeClass = (t) => "fup-type-" + (t || "Follow-up").replace(/[-\s]/g, "");
    const slug = (s) => (s || "").replace(/[-\s]/g, "");

    function formatPhone(raw) {
      const d = normPhone(raw).slice(0, 10);
      if (!d) return "";
      if (d.length <= 3) return `(${d}`;
      if (d.length <= 6) return `(${d.slice(0,3)}) ${d.slice(3)}`;
      return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
    }
    function displayPhone(s) {
      if (!s) return "";
      const d = normPhone(s);
      if (d.length === 10) return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
      return s;
    }
    document.addEventListener("input", (e) => {
      if (e.target.matches('input[name="phone"], input.phone-input')) e.target.value = formatPhone(e.target.value);
    });

    function shortUrl(u) {
      if (!u) return "";
      try {
        const x = new URL(u.startsWith("http") ? u : "https://" + u);
        return x.hostname.replace(/^www\./, "");
      } catch { return u; }
    }

    function fupState(iso) {
      if (!iso) return "none";
      const then = new Date(iso);
      const now = new Date();
      const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
      const tomStart = todayStart + 24*60*60*1000;
      const t = then.getTime();
      if (t < todayStart) return "overdue";
      if (t < tomStart) return "today";
      return "future";
    }
    function isThisWeek(iso) {
      if (!iso) return false;
      const then = new Date(iso);
      const now = new Date();
      const end = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 7);
      return then >= now && then <= end;
    }
    function formatDateTime(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      return d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" })
        + " · " + d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
    }
    function formatNoteTime(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      return d.toLocaleDateString(undefined, { month: "short", day: "numeric" })
        + ", " + d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
    }
    function combineDateTime(dateStr, timeStr) {
      if (!dateStr) return null;
      const t = timeStr || "09:00";
      return new Date(`${dateStr}T${t}:00`).toISOString();
    }
    function splitDateTime(iso) {
      if (!iso) return { date: "", time: "" };
      const d = new Date(iso);
      const pad = (n) => String(n).padStart(2, "0");
      return {
        date: `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`,
        time: `${pad(d.getHours())}:${pad(d.getMinutes())}`,
      };
    }

    function trimNotes(arr) {
      const a = Array.isArray(arr) ? arr : [];
      return a.slice(-NOTE_CAP);
    }
    function appendNote(arr, text) {
      if (!text || !text.trim()) return trimNotes(arr);
      const entry = { at: new Date().toISOString(), text: text.trim() };
      return trimNotes([...(Array.isArray(arr) ? arr : []), entry]);
    }

    // ---------- Filters ----------
    const DEFAULT_FILTERS = { business_type: "", manager: "", web_status: "", client_status: "", motivation: "", followup: "" };
    let filters = { ...DEFAULT_FILTERS };
    function anyFilterActive() { return Object.values(filters).some((v) => v && v !== ""); }

    function applyFiltersToClients(list) {
      return list.filter((c) => {
        if (filters.business_type && c.business_type !== filters.business_type) return false;
        if (filters.manager) {
          if (filters.manager === "__unassigned") { if (c.manager) return false; }
          else if (c.manager !== filters.manager) return false;
        }
        if (filters.web_status && c.web_status !== filters.web_status) return false;
        if (filters.client_status && c.client_status !== filters.client_status) return false;
        if (filters.motivation && c.motivation !== filters.motivation) return false;
        if (filters.followup) {
          const state = fupState(c.follow_up_at);
          if (filters.followup === "overdue" && state !== "overdue") return false;
          if (filters.followup === "today" && state !== "today") return false;
          if (filters.followup === "week" && !isThisWeek(c.follow_up_at)) return false;
          if (filters.followup === "any" && !c.follow_up_at) return false;
          if (filters.followup === "none" && c.follow_up_at) return false;
        }
        return true;
      });
    }

    function renderFilterChips() {
      const chips = document.getElementById("filterChips");
      const parts = [];
      if (filters.business_type) parts.push(["Business", filters.business_type]);
      if (filters.manager) parts.push(["Manager", filters.manager === "__unassigned" ? "Unassigned" : filters.manager]);
      if (filters.web_status) parts.push(["Web Status", filters.web_status]);
      if (filters.client_status) parts.push(["Client Status", filters.client_status]);
      if (filters.motivation) parts.push(["Motivation", filters.motivation]);
      if (filters.followup) {
        const labels = { overdue: "Overdue", today: "Due today", week: "This week", any: "Has follow-up", none: "No follow-up" };
        parts.push(["Follow-up", labels[filters.followup] || filters.followup]);
      }
      chips.innerHTML = parts.map(([k, v]) => `<span class="filter-chip">${esc(k)}: ${esc(v)}</span>`).join("");
      document.getElementById("clearFilters").style.display = anyFilterActive() ? "" : "none";
      try { localStorage.setItem("crm_filters", JSON.stringify(filters)); } catch {}
    }

    try {
      const saved = localStorage.getItem("crm_filters");
      if (saved) filters = { ...DEFAULT_FILTERS, ...JSON.parse(saved) };
    } catch {}

    // ---------- Table ----------
    const COLUMN_TO_TAB = {
      company: "info", business_type: "info", client: "info", phone: "info",
      manager: "client_status", client_status: "client_status",
      motivation: "client_status", followup: "client_status",
      web_status: "web_status",
    };

    function render() {
      const rows = applyFiltersToClients(allClients);
      tbody.innerHTML = "";
      if (!rows || rows.length === 0) {
        emptyEl.style.display = "block";
        document.getElementById("overdueBanner").classList.remove("show");
        renderFilterChips();
        return;
      }
      emptyEl.style.display = "none";
      let overdueCount = 0;
      for (const r of rows) {
        const tr = document.createElement("tr");
        tr.dataset.id = r.id;

        const fState = fupState(r.follow_up_at);
        let fupHtml = '<span style="color:#9ca3af;">Not set</span>';
        if (r.follow_up_at) {
          const dt = formatDateTime(r.follow_up_at);
          const typeTag = `<span class="fup-type-tag ${fupTypeClass(r.follow_up_type)}">${esc(r.follow_up_type || "Follow-up")}</span>`;
          let stateBadge = "";
          if (fState === "overdue") { stateBadge = '<span class="badge overdue">OVERDUE</span>'; overdueCount++; tr.classList.add("row-overdue"); }
          else if (fState === "today") { stateBadge = '<span class="badge due-today">TODAY</span>'; }
          fupHtml = `${esc(dt)} ${typeTag}${stateBadge}`;
        }

        tr.innerHTML = `
          <td class="truncate" data-col="company">${esc(r.company_name) || '<span style="color:#9ca3af;">—</span>'}</td>
          <td class="truncate" data-col="business_type">${esc(r.business_type) || '<span style="color:#9ca3af;">—</span>'}</td>
          <td class="truncate" data-col="client">${esc(r.client_name) || '<span style="color:#9ca3af;">—</span>'}</td>
          <td class="truncate" data-col="phone">${r.phone ? esc(displayPhone(r.phone)) : '<span style="color:#9ca3af;">—</span>'}</td>
          <td data-col="manager">${esc(r.manager) || '<span style="color:#9ca3af;">—</span>'}</td>
          <td data-col="web_status"><span class="badge ${wsClass(r.web_status)}">${esc(r.web_status || "Not Started")}</span></td>
          <td data-col="client_status"><span class="badge ${csClass(r.client_status)}">${esc(r.client_status || "New Lead")}</span></td>
          <td data-col="motivation"><span class="badge ${moClass(r.motivation)}">${esc(r.motivation || "Not Set")}</span></td>
          <td class="truncate" data-col="followup">${fupHtml}</td>
          <td class="actions"><button class="danger" data-action="delete" data-nolink>Del</button></td>
        `;
        tbody.appendChild(tr);
      }

      const banner = document.getElementById("overdueBanner");
      if (overdueCount > 0) {
        banner.textContent = `⚠️ ${overdueCount} client${overdueCount === 1 ? "" : "s"} overdue for follow-up`;
        banner.classList.add("show");
      } else { banner.classList.remove("show"); }
      renderFilterChips();
    }

    let allClients = [];
    async function load() {
      const { data, error } = await sb.from("clients").select("*").order("created_at", { ascending: false });
      if (error) { alert("Load failed: " + error.message); return; }
      allClients = data || [];
      populateFilterModalOptions();
      render();
      refreshCalendar();
    }

    tbody.addEventListener("click", async (e) => {
      const noLink = e.target.closest("[data-nolink]");
      const tr = e.target.closest("tr");
      if (!tr) return;
      const id = tr.dataset.id;

      if (noLink && noLink.dataset.action === "delete") {
        if (!confirm("Delete this entry?")) return;
        const { error } = await sb.from("clients").delete().eq("id", id);
        if (error) { alert("Delete failed: " + error.message); return; }
        load();
        return;
      }
      if (noLink) return;

      const td = e.target.closest("td");
      const col = td?.dataset.col;
      const tab = COLUMN_TO_TAB[col] || "info";
      openDetail(id, tab);
    });

    // ---------- Wizard (Add New Client) — UNCHANGED behavior ----------
    const wizardSteps = [
      { title: "Company Info", desc: "Who is the business?",
        fields: [
          { name: "company_name", label: "Company name *", type: "text", required: true, placeholder: "Acme Paving Co." },
          { name: "business_type", label: "Business type", type: "datalist", list: "business_types", placeholder: "Pick one or type your own" },
        ],
      },
      { title: "Contact", desc: "Who's the point of contact?",
        fields: [
          { name: "client_name", label: "Client name", type: "text", placeholder: "Jane Doe" },
          { name: "phone", label: "Phone", type: "tel", placeholder: "(555) 123-4567", maxlength: 14, inputmode: "numeric", autocomplete: "tel-national" },
        ],
        validate: async (data) => {
          const p = normPhone(data.phone);
          if (!p) return null;
          const existing = allClients.find((c) => normPhone(c.phone) === p);
          if (existing) return `This contact already exists — registered under "${existing.company_name}".`;
          return null;
        },
      },
      { title: "Links", desc: "Profile, post, and finished website.",
        fields: [
          { name: "profile_link", label: "Profile link", type: "url", placeholder: "https://facebook.com/yourclient" },
          { name: "post_link", label: "Post link", type: "url", placeholder: "https://facebook.com/post/..." },
          { name: "finished_website", label: "Finished website", type: "url", placeholder: "https://yourclient.com" },
        ],
      },
      { title: "Assignment", desc: "Who's handling this and where does it stand?",
        fields: [
          { name: "manager", label: "Manager", type: "select", options: ["", "Ivan", "Hector"], optionLabels: { "": "— Unassigned —" } },
          { name: "web_status", label: "Web status", type: "select", options: WEB_STATUSES },
          { name: "client_status", label: "Client status", type: "select", options: CLIENT_STATUSES },
          { name: "motivation", label: "Motivation", type: "select", options: MOTIVATIONS },

      },
      { title: "Schedule Follow-up", desc: "Optional — date, time, and type. Leave blank to skip.",
        fields: [
          { name: "fu_date", label: "Date", type: "date" },
          { name: "fu_time", label: "Time", type: "time" },
          { name: "fu_type", label: "Type", type: "select", options: FOLLOW_UP_TYPES },
        ],
      },
      { title: "Notes", desc: "Add an initial note for the client and/or the website build. Both optional.",
        fields: [
          { name: "initial_client_note", label: "Client notes", type: "textarea", placeholder: "First impressions, relationship context, ..." },
          { name: "initial_web_note", label: "Web notes", type: "textarea", placeholder: "Tech stack preferences, design direction, ..." },
        ],
      },
      { title: "Review", desc: "Double-check before saving.", review: true },
    ];

    const wizardOverlay = document.getElementById("wizardOverlay");
    const stepMeta = document.getElementById("stepMeta");
    const stepBody = document.getElementById("stepBody");
    const progressBar = document.getElementById("progressBar");
    const backBtn = document.getElementById("backBtn");
    const nextBtn = document.getElementById("nextBtn");

    let stepIndex = 0;
    let formData = {};

    function openWizard() {
      stepIndex = 0;
      formData = { web_status: "Not Started", manager: "", client_status: "New Lead", motivation: "Not Set", fu_type: "Follow-up" };
      renderStep();
      wizardOverlay.classList.add("open");
    }
    function closeWizard() { wizardOverlay.classList.remove("open"); }

    function renderStep() {
      const step = wizardSteps[stepIndex];
      stepMeta.textContent = `Step ${stepIndex + 1} of ${wizardSteps.length}`;
      progressBar.style.width = `${((stepIndex + 1) / wizardSteps.length) * 100}%`;
      if (step.review) {
        stepBody.innerHTML = `<h2 class="step-title">${step.title}</h2><p class="step-desc">${step.desc}</p>${renderReview()}`;
      } else {
        const fieldsHtml = step.fields.map(renderField).join("");
        stepBody.innerHTML = `<h2 class="step-title">${step.title}</h2><p class="step-desc">${step.desc}</p>${fieldsHtml}<div class="field-error" id="stepError" style="display:none;"></div>`;
        const firstInput = stepBody.querySelector("input, select, textarea");
        if (firstInput) setTimeout(() => firstInput.focus(), 50);
      }
      backBtn.disabled = stepIndex === 0;
      nextBtn.textContent = stepIndex === wizardSteps.length - 1 ? "Save Client" : "Next";
    }

    function renderField(f) {
      const v = esc(formData[f.name] ?? "");
      if (f.type === "select") {
        const opts = f.options.map((o) => {
          const label = (f.optionLabels && f.optionLabels[o] != null) ? f.optionLabels[o] : o;
          return `<option value="${esc(o)}"${formData[f.name] === o ? " selected" : ""}>${esc(label)}</option>`;
        }).join("");
        return `<div class="field"><label>${esc(f.label)}</label><select name="${f.name}">${opts}</select></div>`;
      }
      if (f.type === "textarea") return `<div class="field"><label>${esc(f.label)}</label><textarea name="${f.name}" placeholder="${esc(f.placeholder || "")}">${v}</textarea></div>`;
      if (f.type === "datalist") return `<div class="field"><label>${esc(f.label)}</label><input type="text" name="${f.name}" list="${esc(f.list)}" value="${v}" placeholder="${esc(f.placeholder || "")}"></div>`;
      const extra = (f.maxlength ? ` maxlength="${f.maxlength}"` : "") + (f.inputmode ? ` inputmode="${esc(f.inputmode)}"` : "") + (f.autocomplete ? ` autocomplete="${esc(f.autocomplete)}"` : "");
      return `<div class="field"><label>${esc(f.label)}</label><input type="${esc(f.type || "text")}" name="${f.name}" value="${v}" placeholder="${esc(f.placeholder || "")}"${f.required ? " required" : ""}${extra}></div>`;
    }

    function renderReview() {
      const fuIso = formData.fu_date ? combineDateTime(formData.fu_date, formData.fu_time) : null;
      const rows = [
        ["Company", formData.company_name], ["Business Type", formData.business_type],
        ["Client", formData.client_name], ["Phone", formData.phone],
        ["Profile Link", formData.profile_link], ["Post Link", formData.post_link],
        ["Finished Website", formData.finished_website],
        ["Manager", formData.manager], ["Web Status", formData.web_status],
        ["Client Status", formData.client_status], ["Motivation", formData.motivation],
        ["Follow-up", fuIso ? `${formatDateTime(fuIso)} (${formData.fu_type || "Follow-up"})` : ""],
        ["Client Notes", formData.initial_client_note], ["Web Notes", formData.initial_web_note],
      ];
      return rows.map(([k, v]) => {
        const has = v && v.toString().trim();
        return `<div class="review-row"><div class="k">${k}</div><div class="v${has ? "" : " muted"}">${has ? esc(v) : "—"}</div></div>`;
      }).join("");
    }

    function collectStepData() {
      const step = wizardSteps[stepIndex];
      if (!step.fields) return;
      for (const f of step.fields) {
        const el = stepBody.querySelector(`[name="${f.name}"]`);
        if (el) formData[f.name] = el.value.trim();
      }
    }
    function showStepError(msg) {
      const el = document.getElementById("stepError");
      if (!el) { alert(msg); return; }
      el.textContent = msg; el.style.display = "block";
    }

    async function goNext() {
      const step = wizardSteps[stepIndex];
      if (!step.review) {
        collectStepData();
        for (const f of (step.fields || [])) {
          if (f.required && !formData[f.name]) { showStepError(`${f.label.replace(" *", "")} is required.`); return; }
        }
        if (step.validate) {
          nextBtn.disabled = true; nextBtn.textContent = "Checking...";
          const err = await step.validate(formData);
          nextBtn.disabled = false; nextBtn.textContent = stepIndex === wizardSteps.length - 1 ? "Save Client" : "Next";
          if (err) { showStepError(err); return; }
        }
      }
      if (stepIndex === wizardSteps.length - 1) { await submitWizard(); return; }
      stepIndex++; renderStep();
    }
    function goBack() { if (stepIndex === 0) return; collectStepData(); stepIndex--; renderStep(); }

    async function submitWizard() {
      nextBtn.disabled = true; nextBtn.textContent = "Saving...";
      const p = normPhone(formData.phone);
      if (p) {
        const existing = allClients.find((c) => normPhone(c.phone) === p);
        if (existing) {
          nextBtn.disabled = false; nextBtn.textContent = "Save Client";
          alert(`This contact already exists — registered under "${existing.company_name}".`);
          return;
        }
      }
      const fuIso = formData.fu_date ? combineDateTime(formData.fu_date, formData.fu_time) : null;
      const clientNotes = formData.initial_client_note ? appendNote([], formData.initial_client_note) : [];
      const webNotes = formData.initial_web_note ? appendNote([], formData.initial_web_note) : [];
      const row = {
        company_name: formData.company_name || null, business_type: formData.business_type || null,
        client_name: formData.client_name || null, phone: formData.phone || null,
        profile_link: formData.profile_link || null, post_link: formData.post_link || null,
        finished_website: formData.finished_website || null,
        manager: formData.manager || null,
        web_status: formData.web_status || "Not Started",
        client_status: formData.client_status || "New Lead",
        motivation: formData.motivation || "Not Set",
        follow_up_at: fuIso, follow_up_type: formData.fu_type || "Follow-up",
        client_notes: clientNotes, web_notes: webNotes,
      };
      const { error } = await sb.from("clients").insert(row);
      nextBtn.disabled = false; nextBtn.textContent = "Save Client";
      if (error) { alert("Insert failed: " + error.message); return; }
      closeWizard(); load();
    }

    // ============================================================
    // PROFILE / DETAIL — REDESIGNED
    // ============================================================
    const detailOverlay = document.getElementById("detailOverlay");
    const detailTitle = document.getElementById("detailTitle");
    const rightContent = document.getElementById("rightContent");
    const notesThreadEl = document.getElementById("notesThread");
    const noteInput = document.getElementById("noteInput");

    let detailId = null;
    let detailRightTab = "info";       // info | client_status | web_status
    let detailNotesTab = "client";      // client | web
    let detailEditingField = null;      // field name being edited (text-field pencil-edit)
    let detailScheduleMode = "view";    // view | menu | edit
    let detailScheduleDraft = null;     // { date, time, type } when in edit mode

    function openDetail(id, defaultTab = "info") {
      detailId = id;
      detailRightTab = defaultTab;
      detailNotesTab = "client";
      detailEditingField = null;
      detailScheduleMode = "view";
      detailScheduleDraft = null;
      renderProfile();
      detailOverlay.classList.add("open");
    }
    function closeDetail() {
      detailOverlay.classList.remove("open");
      detailId = null; detailEditingField = null; detailScheduleDraft = null;
    }
    function getCurrentClient() { return allClients.find((c) => c.id === detailId); }

    function renderProfile() {
      const c = getCurrentClient();
      if (!c) { closeDetail(); return; }
      detailTitle.textContent = c.company_name || "Client Details";

      // Notes panel
      document.getElementById("notesTabClient").classList.toggle("active", detailNotesTab === "client");
      document.getElementById("notesTabWeb").classList.toggle("active", detailNotesTab === "web");
      const notes = detailNotesTab === "client" ? (c.client_notes || []) : (c.web_notes || []);
      const bubbleClass = detailNotesTab === "client" ? "bubble-client" : "bubble-web";
      if (notes.length === 0) {
        notesThreadEl.classList.add("empty");
        notesThreadEl.innerHTML = `No ${detailNotesTab === "client" ? "client" : "web"} notes yet.<br>Type below and hit Send.`;
      } else {
        notesThreadEl.classList.remove("empty");
        notesThreadEl.innerHTML = notes.map((n) => `
          <div class="bubble-wrap">
            <div class="bubble ${bubbleClass}">${esc(n.text)}</div>
            <div class="bubble-time">${esc(formatNoteTime(n.at))}</div>
          </div>
        `).join("");
        // Scroll to bottom (newest)
        setTimeout(() => { notesThreadEl.scrollTop = notesThreadEl.scrollHeight; }, 0);
      }

      // Right tabs active state
      document.querySelectorAll(".right-tabs button").forEach((b) => {
        b.classList.toggle("active", b.dataset.rtab === detailRightTab);
      });

      // Right content
      if (detailRightTab === "info") rightContent.innerHTML = renderInfoTab(c);
      else if (detailRightTab === "client_status") rightContent.innerHTML = renderClientStatusTab(c);
      else rightContent.innerHTML = renderWebStatusTab(c);

      // Auto-focus inline edit input if any
      if (detailEditingField) {
        const inp = rightContent.querySelector(`input[data-edit="${detailEditingField}"]`);
        if (inp) { inp.focus(); inp.select?.(); }
      }
    }

    // ---- Info tab ----
    function renderInfoTab(c) {
      return `
        ${renderInfoRow("Company", c.company_name, "company_name", "text")}
        ${renderInfoRow("Business Type", c.business_type, "business_type", "datalist")}
        ${renderInfoRow("Client", c.client_name, "client_name", "text")}
        ${renderInfoRow("Phone", c.phone, "phone", "phone")}
        ${renderInfoRow("Profile Link", c.profile_link, "profile_link", "url")}
        ${renderInfoRow("Post Link", c.post_link, "post_link", "url")}
      `;
    }

    function renderInfoRow(label, value, fieldName, type) {
      const inEdit = detailEditingField === fieldName;
      if (inEdit) {
        const inputType = type === "phone" ? "tel" : (type === "url" ? "url" : "text");
        const v = type === "phone" ? displayPhone(value) : (value || "");
        const phoneAttrs = type === "phone" ? ' maxlength="14" inputmode="numeric" class="phone-input"' : "";
        const datalistAttr = type === "datalist" ? ' list="business_types"' : "";
        return `
          <div class="info-row">
            <div class="info-label">${esc(label)}</div>
            <div class="inline-edit-row">
              <input type="${inputType}" data-edit="${fieldName}" value="${esc(v)}"${phoneAttrs}${datalistAttr}>
            </div>
            <div class="row-actions">
              <button class="icon-btn" data-action="save-edit" data-field="${fieldName}" title="Save">✓</button>
              <button class="icon-btn" data-action="cancel-edit" title="Cancel">✕</button>
            </div>
          </div>`;
      }
      let displayHtml;
      if (type === "url" && value) displayHtml = `<a href="${esc(value)}" target="_blank" rel="noopener">${esc(value)}</a>`;
      else if (type === "phone" && value) displayHtml = esc(displayPhone(value));
      else if (value) displayHtml = esc(value);
      else displayHtml = `<span class="muted">—</span>`;
      const showCopy = !!value;
      const copyValue = type === "phone" ? displayPhone(value) : (value || "");
      const copyBtn = showCopy ? `<button class="icon-btn" data-action="copy" data-value="${esc(copyValue)}" title="Copy">📋</button>` : "";
      return `
        <div class="info-row">
          <div class="info-label">${esc(label)}</div>
          <div class="info-value${value ? "" : " muted"}">${displayHtml}</div>
          <div class="row-actions">
            ${copyBtn}
            <button class="icon-btn" data-action="edit" data-field="${fieldName}" title="Edit">✏️</button>
          </div>
        </div>`;
    }

    // ---- Client Status tab ----
    function renderClientStatusTab(c) {
      return `
        <div class="field-block">
          <div class="field-block-title">Manager</div>
          <div class="pill-bar">
            ${MANAGERS.map((m) => {
              const active = (c.manager || "") === m.value;
              return `<button class="pill p-mgr-${slug(m.label)}${active ? " active" : ""}" data-action="pill" data-field="manager" data-value="${esc(m.value)}">${esc(m.label)}</button>`;
            }).join("")}
          </div>
        </div>

        <div class="field-block">
          <div class="field-block-title">Client Status</div>
          <div class="pill-bar">
            ${CLIENT_STATUSES.map((o) => {
              const active = (c.client_status || "New Lead") === o;
              return `<button class="pill p-cs-${slug(o)}${active ? " active" : ""}" data-action="pill" data-field="client_status" data-value="${esc(o)}">${esc(o)}</button>`;
            }).join("")}
          </div>
        </div>

        <div class="field-block">
          <div class="field-block-title">Motivation</div>
          <div class="pill-bar">
            ${MOTIVATIONS.map((o) => {
              const active = (c.motivation || "Not Set") === o;
              return `<button class="pill p-mo-${slug(o)}${active ? " active" : ""}" data-action="pill" data-field="motivation" data-value="${esc(o)}">${esc(o)}</button>`;
            }).join("")}
          </div>
        </div>

        <div class="field-block">
          <div class="field-block-title">Schedule</div>
          ${renderScheduleSection(c)}
        </div>
      `;
    }

    function renderScheduleSection(c) {
      const hasSchedule = !!c.follow_up_at;
      const state = fupState(c.follow_up_at);
      const overdueClass = state === "overdue" ? " overdue" : "";

      // State B (something scheduled, view mode)
      if (hasSchedule && detailScheduleMode === "view") {
        const icon = c.follow_up_type === "Appointment" ? "📞" : "📅";
        const note = state === "overdue" ? " (overdue)" : (state === "today" ? " (today)" : "");
        return `
          <div class="schedule-block${overdueClass}">
            <div class="schedule-current">
              <div class="source-of-truth${overdueClass}">${icon} ${esc(c.follow_up_type || "Follow-up")} — ${esc(formatDateTime(c.follow_up_at))}${note}</div>
              <button class="icon-btn" data-action="schedule-menu">Edit</button>
            </div>
          </div>`;
      }
      // State B' (menu mode — Reschedule / Cancel / Back)
      if (hasSchedule && detailScheduleMode === "menu") {
        const icon = c.follow_up_type === "Appointment" ? "📞" : "📅";
        return `
          <div class="schedule-block${overdueClass}">
            <div class="schedule-current">
              <div class="source-of-truth${overdueClass}">${icon} ${esc(c.follow_up_type || "Follow-up")} — ${esc(formatDateTime(c.follow_up_at))}</div>
            </div>
            <div class="schedule-edit-menu">
              <button data-action="schedule-reschedule">Reschedule</button>
              <button class="danger" data-action="schedule-cancel">Cancel Schedule</button>
              <button class="ghost" data-action="schedule-back">Back</button>
            </div>
          </div>`;
      }
      // State A (no schedule) OR State C (edit/reschedule mode)
      const draft = detailScheduleDraft || (() => {
        const parts = splitDateTime(c.follow_up_at);
        return { date: parts.date, time: parts.time || "09:00", type: c.follow_up_type || "Follow-up" };
      })();
      const isReschedule = hasSchedule && detailScheduleMode === "edit";
      return `
        <div class="schedule-block">
          ${!isReschedule ? '<div class="source-of-truth empty">Not scheduled</div>' : ""}
          <div class="schedule-form">
            <div class="pill-bar">
              <button class="pill p-fut-Followup${draft.type === "Follow-up" ? " active" : ""}" data-action="schedule-type" data-value="Follow-up">Follow-up</button>
              <button class="pill p-fut-Appointment${draft.type === "Appointment" ? " active" : ""}" data-action="schedule-type" data-value="Appointment">Appointment</button>
            </div>
            <div class="date-time-row">
              <input type="date" id="scheduleDate" value="${esc(draft.date)}">
              <input type="time" id="scheduleTime" value="${esc(draft.time)}">
            </div>
            <div class="form-actions">
              ${isReschedule ? '<button class="ghost" data-action="schedule-cancel-edit">Cancel</button>' : ""}
              <button data-action="schedule-save">${isReschedule ? "Save" : "Schedule"}</button>
            </div>
          </div>
        </div>`;
    }

    // ---- Web Status tab ----
    function renderWebStatusTab(c) {
      return `
        <div class="field-block">
          <div class="field-block-title">Web Status</div>
          <div class="pill-bar">
            ${WEB_STATUSES.map((o) => {
              const active = (c.web_status || "Not Started") === o;
              return `<button class="pill p-ws-${slug(o)}${active ? " active" : ""}" data-action="pill" data-field="web_status" data-value="${esc(o)}">${esc(o)}</button>`;
            }).join("")}
          </div>
        </div>

        <div class="field-block">
          <div class="field-block-title">Finished Website</div>
          ${renderInfoRow("URL", c.finished_website, "finished_website", "url")}
        </div>
      `;
    }

    // ---- Right panel event handling ----
    rightContent.addEventListener("click", async (e) => {
      const btn = e.target.closest("[data-action]");
      if (!btn) return;
      const action = btn.dataset.action;

      if (action === "pill") {
        await handlePillClick(btn.dataset.field, btn.dataset.value);
      } else if (action === "edit") {
        detailEditingField = btn.dataset.field;
        renderProfile();
      } else if (action === "cancel-edit") {
        detailEditingField = null;
        renderProfile();
      } else if (action === "save-edit") {
        await handleSaveInlineEdit(btn.dataset.field);
      } else if (action === "copy") {
        await handleCopy(btn, btn.dataset.value);
      } else if (action === "schedule-menu") {
        detailScheduleMode = "menu"; renderProfile();
      } else if (action === "schedule-back") {
        detailScheduleMode = "view"; detailScheduleDraft = null; renderProfile();
      } else if (action === "schedule-reschedule") {
        detailScheduleMode = "edit";
        const c = getCurrentClient();
        const parts = splitDateTime(c.follow_up_at);
        detailScheduleDraft = { date: parts.date, time: parts.time || "09:00", type: c.follow_up_type || "Follow-up" };
        renderProfile();
      } else if (action === "schedule-cancel-edit") {
        detailScheduleMode = "view"; detailScheduleDraft = null; renderProfile();
      } else if (action === "schedule-cancel") {
        if (!confirm("Cancel this schedule? It will be removed.")) return;
        await updateClientField({ follow_up_at: null });
        detailScheduleMode = "view"; detailScheduleDraft = null;
        renderProfile();
      } else if (action === "schedule-type") {
        const c = getCurrentClient();
        if (!detailScheduleDraft) {
          const parts = splitDateTime(c.follow_up_at);
          detailScheduleDraft = { date: parts.date, time: parts.time || "09:00", type: c.follow_up_type || "Follow-up" };
        }
        detailScheduleDraft.type = btn.dataset.value;
        renderProfile();
      } else if (action === "schedule-save") {
        await handleScheduleSave();
      }
    });

    // Capture date/time edits into the draft so re-renders preserve them
    rightContent.addEventListener("input", (e) => {
      if (e.target.id === "scheduleDate" || e.target.id === "scheduleTime") {
        const c = getCurrentClient();
        if (!detailScheduleDraft) {
          const parts = splitDateTime(c?.follow_up_at);
          detailScheduleDraft = { date: parts.date, time: parts.time || "09:00", type: (c && c.follow_up_type) || "Follow-up" };
        }
        if (e.target.id === "scheduleDate") detailScheduleDraft.date = e.target.value;
        else detailScheduleDraft.time = e.target.value;
      }
    });

    // Inline edit save on Enter / cancel on Escape
    rightContent.addEventListener("keydown", (e) => {
      if (!detailEditingField) return;
      if (e.target.matches('input[data-edit]')) {
        if (e.key === "Enter") { e.preventDefault(); handleSaveInlineEdit(detailEditingField); }
        else if (e.key === "Escape") { e.preventDefault(); detailEditingField = null; renderProfile(); }
      }
    });
    // Save on blur
    rightContent.addEventListener("blur", (e) => {
      if (!detailEditingField) return;
      if (e.target.matches('input[data-edit]')) {
        // Slight delay so a click on the cancel button isn't pre-empted by blur-save
        setTimeout(() => {
          if (detailEditingField && document.contains(e.target)) handleSaveInlineEdit(detailEditingField);
        }, 120);
      }
    }, true);

    async function handlePillClick(field, value) {
      const c = getCurrentClient();
      if (!c) return;
      // No-op if already this value
      if ((c[field] || "") === value || (field === "manager" && (c.manager || "") === value)) {
        // Optimistically refresh UI to ensure visual sync
        renderProfile(); return;
      }
      const updates = {};
      updates[field] = value === "" ? null : value;
      await updateClientField(updates);
      renderProfile();
    }

    async function handleSaveInlineEdit(field) {
      const inp = rightContent.querySelector(`input[data-edit="${field}"]`);
      if (!inp) { detailEditingField = null; renderProfile(); return; }
      let value = inp.value.trim();

      // Phone: dedupe check
      if (field === "phone") {
        const p = normPhone(value);
        if (p) {
          const dup = allClients.find((c) => c.id !== detailId && normPhone(c.phone) === p);
          if (dup) {
            alert(`This phone is already registered under "${dup.company_name}".`);
            return;
          }
        }
      }
      // Required: company_name
      if (field === "company_name" && !value) {
        alert("Company name cannot be empty.");
        return;
      }
      const updates = {};
      updates[field] = value === "" ? null : value;
      detailEditingField = null;
      await updateClientField(updates);
      renderProfile();
    }

    async function handleScheduleSave() {
      const c = getCurrentClient();
      if (!c) return;
      const draft = detailScheduleDraft || (() => {
        const parts = splitDateTime(c.follow_up_at);
        return { date: parts.date, time: parts.time || "09:00", type: c.follow_up_type || "Follow-up" };
      })();
      // Pull live values from inputs in case they changed
      const dateInp = document.getElementById("scheduleDate");
      const timeInp = document.getElementById("scheduleTime");
      if (dateInp) draft.date = dateInp.value;
      if (timeInp) draft.time = timeInp.value;

      if (!draft.date) { alert("Pick a date first."); return; }
      const iso = combineDateTime(draft.date, draft.time || "09:00");
      await updateClientField({ follow_up_at: iso, follow_up_type: draft.type || "Follow-up" });
      detailScheduleMode = "view";
      detailScheduleDraft = null;
      renderProfile();
    }

    async function handleCopy(btnEl, value) {
      try {
        await navigator.clipboard.writeText(value || "");
        const original = btnEl.innerHTML;
        btnEl.classList.add("copied");
        btnEl.innerHTML = "✓ Copied";
        setTimeout(() => { btnEl.classList.remove("copied"); btnEl.innerHTML = original; }, 1200);
      } catch {
        alert("Could not copy. Browser blocked clipboard access.");
      }
    }

    async function updateClientField(updates) {
      // Optimistic local update
      const c = getCurrentClient();
      if (c) Object.assign(c, updates);
      const { error } = await sb.from("clients").update(updates).eq("id", detailId);
      if (error) {
        alert("Update failed: " + error.message);
        await load(); return;
      }
      // Reflect in table + calendar
      render();
      refreshCalendar();
    }

    // Right-panel tab clicks
    document.querySelector(".right-tabs").addEventListener("click", (e) => {
      const b = e.target.closest("button[data-rtab]");
      if (!b) return;
      detailRightTab = b.dataset.rtab;
      detailEditingField = null;
      renderProfile();
    });

    // Notes panel events
    document.getElementById("notesTabClient").addEventListener("click", () => { detailNotesTab = "client"; renderProfile(); });
    document.getElementById("notesTabWeb").addEventListener("click", () => { detailNotesTab = "web"; renderProfile(); });

    async function sendNote() {
      const text = noteInput.value.trim();
      if (!text) return;
      const c = getCurrentClient();
      if (!c) return;
      const field = detailNotesTab === "client" ? "client_notes" : "web_notes";
      const newArr = appendNote(c[field] || [], text);
      noteInput.value = "";
      await updateClientField({ [field]: newArr });
      renderProfile();
    }
    document.getElementById("sendNoteBtn").addEventListener("click", sendNote);
    noteInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendNote();
      }
    });

    // ---------- Filter modal ----------
    const filterOverlay = document.getElementById("filterOverlay");

    function populateFilterModalOptions() {
      const types = Array.from(new Set(allClients.map((c) => c.business_type).filter(Boolean))).sort();
      document.getElementById("f_business_type").innerHTML = `<option value="">Any</option>` + types.map((t) => `<option value="${esc(t)}">${esc(t)}</option>`).join("");
      document.getElementById("f_web_status").innerHTML    = `<option value="">Any</option>` + WEB_STATUSES.map((o) => `<option value="${esc(o)}">${esc(o)}</option>`).join("");
      document.getElementById("f_client_status").innerHTML = `<option value="">Any</option>` + CLIENT_STATUSES.map((o) => `<option value="${esc(o)}">${esc(o)}</option>`).join("");
      document.getElementById("f_motivation").innerHTML    = `<option value="">Any</option>` + MOTIVATIONS.map((o) => `<option value="${esc(o)}">${esc(o)}</option>`).join("");
    }
    function openFilterModal() {
      document.getElementById("f_business_type").value = filters.business_type;
      document.getElementById("f_manager").value = filters.manager;
      document.getElementById("f_web_status").value = filters.web_status;
      document.getElementById("f_client_status").value = filters.client_status;
      document.getElementById("f_motivation").value = filters.motivation;
      document.getElementById("f_followup").value = filters.followup;
      filterOverlay.classList.add("open");
    }
    function closeFilterModal() { filterOverlay.classList.remove("open"); }
    function applyFilterFromModal() {
      filters = {
        business_type: document.getElementById("f_business_type").value,
        manager: document.getElementById("f_manager").value,
        web_status: document.getElementById("f_web_status").value,
        client_status: document.getElementById("f_client_status").value,
        motivation: document.getElementById("f_motivation").value,
        followup: document.getElementById("f_followup").value,
      };
      closeFilterModal(); render(); refreshCalendar();
    }
    function resetFiltersModal() {
      ["f_business_type","f_manager","f_web_status","f_client_status","f_motivation","f_followup"].forEach((id) => document.getElementById(id).value = "");
    }
    function clearAllFilters() { filters = { ...DEFAULT_FILTERS }; render(); refreshCalendar(); }

    // ---------- Tabs (List/Calendar) + Calendar ----------
    let calendarInstance = null;

    function switchTab(name) {
      document.querySelectorAll(".tab").forEach((t) => t.classList.toggle("active", t.dataset.view === name));
      document.querySelectorAll(".tab-content").forEach((t) => t.classList.toggle("active", t.dataset.view === name));
      if (name === "calendar") {
        initCalendar();
        setTimeout(() => { if (calendarInstance) calendarInstance.updateSize(); }, 50);
      }
    }

    function buildCalendarEvents() {
      const visible = applyFiltersToClients(allClients);
      return visible.filter((c) => c.follow_up_at).map((c) => {
        const state = fupState(c.follow_up_at);
        const isAppt = c.follow_up_type === "Appointment";
        const color = state === "overdue" ? "#dc2626" : (isAppt ? "#f97316" : "#3b82f6");
        const prefix = isAppt ? "📞 " : "";
        return { id: c.id, title: prefix + (c.company_name || "(no name)"), start: c.follow_up_at, allDay: false, color };
      });
    }

    function initCalendar() {
      if (calendarInstance) return;
      const el = document.getElementById("calendar");
      calendarInstance = new FullCalendar.Calendar(el, {
        initialView: "dayGridMonth",
        headerToolbar: { left: "prev,next today", center: "title", right: "dayGridMonth,timeGridWeek,timeGridDay,listWeek" },
        height: "auto",
        events: buildCalendarEvents(),
        eventClick: (info) => { info.jsEvent.preventDefault(); openDetail(info.event.id, "client_status"); },
      });
      calendarInstance.render();
    }
    function refreshCalendar() {
      if (!calendarInstance) return;
      const events = buildCalendarEvents();
      calendarInstance.removeAllEvents();
      events.forEach((e) => calendarInstance.addEvent(e));
    }

    // ---------- Wire up ----------
    document.querySelectorAll(".tab").forEach((t) => t.addEventListener("click", () => switchTab(t.dataset.view)));

    document.getElementById("openWizard").addEventListener("click", openWizard);
    document.getElementById("closeWizard").addEventListener("click", closeWizard);
    wizardOverlay.addEventListener("click", (e) => { if (e.target === wizardOverlay) closeWizard(); });
    backBtn.addEventListener("click", goBack);
    nextBtn.addEventListener("click", goNext);

    document.getElementById("closeDetail").addEventListener("click", closeDetail);
    detailOverlay.addEventListener("click", (e) => { if (e.target === detailOverlay) closeDetail(); });

    document.getElementById("openFilters").addEventListener("click", openFilterModal);
    document.getElementById("closeFilter").addEventListener("click", closeFilterModal);
    filterOverlay.addEventListener("click", (e) => { if (e.target === filterOverlay) closeFilterModal(); });
    document.getElementById("filterApply").addEventListener("click", applyFilterFromModal);
    document.getElementById("filterReset").addEventListener("click", resetFiltersModal);
    document.getElementById("clearFilters").addEventListener("click", clearAllFilters);

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        if (filterOverlay.classList.contains("open")) closeFilterModal();
        else if (wizardOverlay.classList.contains("open")) closeWizard();
        else if (detailOverlay.classList.contains("open")) closeDetail();
      }
      if (e.key === "Enter" && wizardOverlay.classList.contains("open") && e.target.tagName !== "TEXTAREA" && e.target !== noteInput) {
        e.preventDefault(); goNext();
      }
    });

    load();
  </script>
</body>
</html>
