<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini CRM</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f6f7f9;
      color: #1a1a1a;
    }
    h1 { margin: 0 0 4px; font-size: 24px; }
    .sub { color: #666; margin-bottom: 24px; font-size: 14px; }
    .header-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }
    button {
      padding: 8px 14px;
      background: #111827;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background: #374151; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.ghost { background: transparent; color: #374151; border: 1px solid #d1d5db; }
    button.ghost:hover { background: #f3f4f6; }
    button.danger { background: #dc2626; }
    button.danger:hover { background: #b91c1c; }
    button.primary-lg { font-size: 15px; padding: 10px 18px; }

    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td {
      text-align: left;
      padding: 12px 10px;
      border-bottom: 1px solid #e5e7eb;
      vertical-align: middle;
    }
    th { font-weight: 600; color: #555; background: #f9fafb; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
    tbody tr { cursor: pointer; transition: background 120ms; }
    tbody tr:hover { background: #f9fafb; }
    td.truncate { max-width: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    td.actions { white-space: nowrap; text-align: right; }

    .badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 500; }
    .status-Prospect { background: #fef3c7; color: #92400e; }
    .status-InProgress { background: #dbeafe; color: #1e40af; }
    .status-Finished { background: #d1fae5; color: #065f46; }
    .status-DeadLead { background: #e5e7eb; color: #6b7280; }

    .empty { text-align: center; color: #999; padding: 32px; font-size: 14px; }
    .error { background: #fee2e2; color: #991b1b; padding: 12px; border-radius: 6px; margin-bottom: 16px; font-size: 14px; }
    a { color: #2563eb; }
    a.web-link { font-size: 13px; }

    /* Modal shared */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(17, 24, 39, 0.5);
      display: none;
      align-items: center; justify-content: center;
      z-index: 1000;
      padding: 16px;
    }
    .overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 12px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-height: 90vh;
    }
    .modal-header {
      padding: 16px 20px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-title { font-size: 16px; font-weight: 600; }
    .modal-close {
      background: transparent; color: #6b7280; border: none;
      font-size: 22px; padding: 4px 8px; line-height: 1;
    }
    .modal-close:hover { background: #f3f4f6; }
    .modal-footer {
      padding: 14px 20px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      background: #f9fafb;
    }
    .step-meta { padding: 16px 20px 4px; color: #6b7280; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; }
    .step-body { padding: 4px 20px 16px; overflow-y: auto; flex: 1; }
    .step-title { font-size: 18px; font-weight: 600; margin: 0 0 6px; }
    .step-desc { color: #6b7280; font-size: 14px; margin: 0 0 16px; }

    /* Wizard progress */
    .progress { height: 4px; background: #e5e7eb; position: relative; }
    .progress-bar { height: 100%; background: #111827; transition: width 200ms ease; }

    /* Fields */
    .field { margin-bottom: 12px; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 4px;
      color: #374151;
    }
    .field input, .field select, .field textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }
    .field textarea { min-height: 100px; resize: vertical; }
    .field-error {
      color: #991b1b;
      font-size: 13px;
      background: #fee2e2;
      padding: 8px 10px;
      border-radius: 6px;
      margin-top: 8px;
    }

    /* Detail view (static display) */
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 16px; padding: 16px 20px; }
    .detail-grid .detail-full { grid-column: 1 / -1; }
    .detail-item .k {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6b7280;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .detail-item .v {
      font-size: 14px;
      color: #1f2937;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .detail-item .v.muted { color: #9ca3af; font-style: italic; }

    /* Review (wizard) */
    .review-row {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid #f3f4f6;
      font-size: 14px;
    }
    .review-row:last-child { border-bottom: none; }
    .review-row .k { color: #6b7280; font-weight: 500; }
    .review-row .v { color: #1f2937; word-break: break-word; }
    .review-row .v.muted { color: #9ca3af; font-style: italic; }
  </style>
</head>
<body>
  <div class="header-bar">
    <div>
      <h1>Mini CRM</h1>
      <div class="sub">Hello Mini CRM</div>
    </div>
    <button class="primary-lg" id="openWizard">+ Add New Client</button>
  </div>

  <div id="configError" class="error" style="display:none;"></div>

  <datalist id="business_types">
    <option value="Appliance Repair">
    <option value="Auto Detailing">
    <option value="Bathroom Remodeling">
    <option value="Carpentry">
    <option value="Carpet Cleaning">
    <option value="Chimney Sweep">
    <option value="Cleaning - Commercial">
    <option value="Cleaning - Residential">
    <option value="Commercial Construction">
    <option value="Concrete">
    <option value="Decks">
    <option value="Demolition">
    <option value="Drywall">
    <option value="Electrical">
    <option value="Epoxy Flooring">
    <option value="Excavation">
    <option value="Fencing">
    <option value="Flooring">
    <option value="Foundation Repair">
    <option value="Garage Door">
    <option value="General Contractor">
    <option value="Gutters">
    <option value="Handyman">
    <option value="HVAC">
    <option value="Insulation">
    <option value="Irrigation">
    <option value="Junk Removal">
    <option value="Kitchen Remodeling">
    <option value="Landscaping">
    <option value="Lawn Care">
    <option value="Locksmith">
    <option value="Marketing Agency">
    <option value="Masonry">
    <option value="Mobile Car Wash">
    <option value="Moving Services">
    <option value="Painting - Exterior">
    <option value="Painting - Interior">
    <option value="Pavers">
    <option value="Pest Control">
    <option value="Photography">
    <option value="Plumbing">
    <option value="Pool Installation">
    <option value="Pool Service">
    <option value="Pressure Washing">
    <option value="Real Estate">
    <option value="Remodeling">
    <option value="Roofing">
    <option value="Septic">
    <option value="Siding">
    <option value="Snow Removal">
    <option value="Solar Installation">
    <option value="Stucco">
    <option value="Tree Service">
    <option value="Waterproofing">
    <option value="Web Design">
    <option value="Welding">
    <option value="Window Cleaning">
    <option value="Window Installation">
  </datalist>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th style="width: 16%;">Company</th>
          <th style="width: 12%;">Business Type</th>
          <th style="width: 12%;">Client</th>
          <th style="width: 12%;">Phone</th>
          <th style="width: 16%;">Website</th>
          <th style="width: 10%;">Manager</th>
          <th style="width: 12%;">Status</th>
          <th style="width: 10%;"></th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div id="empty" class="empty" style="display:none;">No entries yet. Click "+ Add New Client" to start.</div>
  </div>

  <!-- Wizard modal -->
  <div class="overlay" id="wizardOverlay">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="wizardTitle">
      <div class="modal-header">
        <div class="modal-title" id="wizardTitle">Add New Client</div>
        <button class="modal-close" id="closeWizard" aria-label="Close">×</button>
      </div>
      <div class="progress"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
      <div class="step-meta" id="stepMeta">Step 1 of 6</div>
      <div class="step-body" id="stepBody"></div>
      <div class="modal-footer">
        <button class="ghost" id="backBtn">Back</button>
        <button id="nextBtn">Next</button>
      </div>
    </div>
  </div>

  <!-- Detail / Edit modal -->
  <div class="overlay" id="detailOverlay">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="detailTitle">
      <div class="modal-header">
        <div class="modal-title" id="detailTitle">Client Details</div>
        <button class="modal-close" id="closeDetail" aria-label="Close">×</button>
      </div>
      <div id="detailBody" class="step-body" style="padding: 0;"></div>
      <div class="modal-footer" id="detailFooter"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://ljghuyeugzmduzzvngkc.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxqZ2h1eWV1Z3ptZHV6enZuZ2tjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTIzOTIsImV4cCI6MjA5MjI4ODM5Mn0.aoeOD1Xvm_q_ZYlJ_x72J_WvmODkwvbNQ7dwbCa5bTY";

    const errEl = document.getElementById("configError");
    if (SUPABASE_URL.startsWith("__") || SUPABASE_ANON_KEY.startsWith("__")) {
      errEl.style.display = "block";
      errEl.textContent = "Supabase is not configured.";
    }

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const tbody = document.getElementById("rows");
    const emptyEl = document.getElementById("empty");

    const esc = (s) => (s ?? "").toString().replace(/[&<>"']/g, (c) => (
      { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
    ));
    const statusClass = (s) => "status-" + (s || "Prospect").replace(/\s/g, "");
    const normPhone = (s) => (s || "").replace(/\D+/g, "");
    const STATUSES = ["Prospect", "In Progress", "Finished", "Dead Lead"];

    // US-format phone: (XXX) XXX-XXXX. Accepts any input, formats up to 10 digits.
    function formatPhone(raw) {
      const d = normPhone(raw).slice(0, 10);
      if (!d) return "";
      if (d.length <= 3) return `(${d}`;
      if (d.length <= 6) return `(${d.slice(0,3)}) ${d.slice(3)}`;
      return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
    }
    // Reformat DB value for display (only if it's a clean 10-digit US number).
    function displayPhone(s) {
      if (!s) return "";
      const d = normPhone(s);
      if (d.length === 10) return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
      return s;
    }

    // Live-format any phone input as the user types (wizard + edit modal).
    document.addEventListener("input", (e) => {
      if (e.target.matches('input[name="phone"]')) {
        e.target.value = formatPhone(e.target.value);
      }
    });

    function shortUrl(u) {
      if (!u) return "";
      try {
        const x = new URL(u.startsWith("http") ? u : "https://" + u);
        return x.hostname.replace(/^www\./, "");
      } catch { return u; }
    }

    // ---------- Table render (read-only) ----------
    function render(rows) {
      tbody.innerHTML = "";
      if (!rows || rows.length === 0) {
        emptyEl.style.display = "block";
        return;
      }
      emptyEl.style.display = "none";
      for (const r of rows) {
        const tr = document.createElement("tr");
        tr.dataset.id = r.id;
        const webHtml = r.finished_website
          ? `<a class="web-link" href="${esc(r.finished_website)}" target="_blank" rel="noopener" data-nolink>${esc(shortUrl(r.finished_website))}</a>`
          : '<span style="color:#9ca3af;">—</span>';
        tr.innerHTML = `
          <td class="truncate">${esc(r.company_name) || '<span style="color:#9ca3af;">—</span>'}</td>
          <td class="truncate">${esc(r.business_type) || '<span style="color:#9ca3af;">—</span>'}</td>
          <td class="truncate">${esc(r.client_name) || '<span style="color:#9ca3af;">—</span>'}</td>
          <td class="truncate">${r.phone ? esc(displayPhone(r.phone)) : '<span style="color:#9ca3af;">—</span>'}</td>
          <td class="truncate">${webHtml}</td>
          <td>${esc(r.manager) || '<span style="color:#9ca3af;">—</span>'}</td>
          <td><span class="badge ${statusClass(r.status)}">${esc(r.status || "Prospect")}</span></td>
          <td class="actions"><button class="danger" data-action="delete" data-nolink>Del</button></td>
        `;
        tbody.appendChild(tr);
      }
    }

    let allClients = [];
    async function load() {
      const { data, error } = await sb
        .from("clients")
        .select("*")
        .order("created_at", { ascending: false });
      if (error) { alert("Load failed: " + error.message); return; }
      allClients = data || [];
      render(allClients);
    }

    // Row click opens detail; delete button & website link don't trigger it.
    tbody.addEventListener("click", async (e) => {
      const noLink = e.target.closest("[data-nolink]");
      const tr = e.target.closest("tr");
      if (!tr) return;
      const id = tr.dataset.id;

      if (noLink && noLink.dataset.action === "delete") {
        if (!confirm("Delete this entry?")) return;
        const { error } = await sb.from("clients").delete().eq("id", id);
        if (error) { alert("Delete failed: " + error.message); return; }
        load();
        return;
      }

      if (noLink) return; // clicked the web link — let it open normally

      openDetail(id);
    });

    // ---------- Wizard ----------
    const wizardSteps = [
      {
        title: "Company Info",
        desc: "Who is the business?",
        fields: [
          { name: "company_name", label: "Company name *", type: "text", required: true, placeholder: "Acme Paving Co." },
          { name: "business_type", label: "Business type", type: "datalist", list: "business_types", placeholder: "Pick one or type your own" },
        ],
      },
      {
        title: "Contact",
        desc: "Who's the point of contact?",
        fields: [
          { name: "client_name", label: "Client name", type: "text", placeholder: "Jane Doe" },
          { name: "phone", label: "Phone", type: "tel", placeholder: "(555) 123-4567", maxlength: 14, inputmode: "numeric", autocomplete: "tel-national" },
        ],
        validate: async (data) => {
          const p = normPhone(data.phone);
          if (!p) return null;
          const existing = allClients.find((c) => normPhone(c.phone) === p);
          if (existing) {
            return `This contact already exists — registered under "${existing.company_name}".`;
          }
          return null;
        },
      },
      {
        title: "Links",
        desc: "Source link (social media or lead source) and finished website if live.",
        fields: [
          { name: "link", label: "Source link", type: "url", placeholder: "https://facebook.com/... or any source URL" },
          { name: "finished_website", label: "Finished website", type: "url", placeholder: "https://yourclient.com" },
        ],
      },
      {
        title: "Assignment",
        desc: "Who's handling this and where does it stand?",
        fields: [
          { name: "manager", label: "Manager", type: "select", options: ["", "Ivan", "Hector"], optionLabels: { "": "— Unassigned —" } },
          { name: "status", label: "Status", type: "select", options: STATUSES },
        ],
      },
      {
        title: "Notes",
        desc: "Anything else worth remembering?",
        fields: [
          { name: "notes", label: "Notes", type: "textarea", placeholder: "Met at trade show, interested in Q2 project..." },
        ],
      },
      {
        title: "Review",
        desc: "Double-check before saving.",
        review: true,
      },
    ];

    const wizardOverlay = document.getElementById("wizardOverlay");
    const stepMeta = document.getElementById("stepMeta");
    const stepBody = document.getElementById("stepBody");
    const progressBar = document.getElementById("progressBar");
    const backBtn = document.getElementById("backBtn");
    const nextBtn = document.getElementById("nextBtn");

    let stepIndex = 0;
    let formData = {};

    function openWizard() {
      stepIndex = 0;
      formData = { status: "Prospect", manager: "" };
      renderStep();
      wizardOverlay.classList.add("open");
    }

    function closeWizard() { wizardOverlay.classList.remove("open"); }

    function renderStep() {
      const step = wizardSteps[stepIndex];
      stepMeta.textContent = `Step ${stepIndex + 1} of ${wizardSteps.length}`;
      progressBar.style.width = `${((stepIndex + 1) / wizardSteps.length) * 100}%`;

      if (step.review) {
        stepBody.innerHTML = `
          <h2 class="step-title">${step.title}</h2>
          <p class="step-desc">${step.desc}</p>
          ${renderReview()}
        `;
      } else {
        const fieldsHtml = step.fields.map(renderField).join("");
        stepBody.innerHTML = `
          <h2 class="step-title">${step.title}</h2>
          <p class="step-desc">${step.desc}</p>
          ${fieldsHtml}
          <div class="field-error" id="stepError" style="display:none;"></div>
        `;
        const firstInput = stepBody.querySelector("input, select, textarea");
        if (firstInput) setTimeout(() => firstInput.focus(), 50);
      }

      backBtn.disabled = stepIndex === 0;
      nextBtn.textContent = stepIndex === wizardSteps.length - 1 ? "Save Client" : "Next";
    }

    function renderField(f) {
      const v = esc(formData[f.name] ?? "");
      if (f.type === "select") {
        const opts = f.options.map((o) => {
          const label = (f.optionLabels && f.optionLabels[o] != null) ? f.optionLabels[o] : o;
          return `<option value="${esc(o)}"${formData[f.name] === o ? " selected" : ""}>${esc(label)}</option>`;
        }).join("");
        return `<div class="field"><label>${esc(f.label)}</label><select name="${f.name}">${opts}</select></div>`;
      }
      if (f.type === "textarea") {
        return `<div class="field"><label>${esc(f.label)}</label><textarea name="${f.name}" placeholder="${esc(f.placeholder || "")}">${v}</textarea></div>`;
      }
      if (f.type === "datalist") {
        return `<div class="field"><label>${esc(f.label)}</label><input type="text" name="${f.name}" list="${esc(f.list)}" value="${v}" placeholder="${esc(f.placeholder || "")}"></div>`;
      }
      const extra =
        (f.maxlength ? ` maxlength="${f.maxlength}"` : "") +
        (f.inputmode ? ` inputmode="${esc(f.inputmode)}"` : "") +
        (f.autocomplete ? ` autocomplete="${esc(f.autocomplete)}"` : "");
      return `<div class="field"><label>${esc(f.label)}</label><input type="${esc(f.type || "text")}" name="${f.name}" value="${v}" placeholder="${esc(f.placeholder || "")}"${f.required ? " required" : ""}${extra}></div>`;
    }

    function renderReview() {
      const rows = [
        ["Company", formData.company_name],
        ["Business Type", formData.business_type],
        ["Client", formData.client_name],
        ["Phone", formData.phone],
        ["Source Link", formData.link],
        ["Finished Website", formData.finished_website],
        ["Manager", formData.manager],
        ["Status", formData.status],
        ["Notes", formData.notes],
      ];
      return rows.map(([k, v]) => {
        const has = v && v.toString().trim();
        return `<div class="review-row"><div class="k">${k}</div><div class="v${has ? "" : " muted"}">${has ? esc(v) : "—"}</div></div>`;
      }).join("");
    }

    function collectStepData() {
      const step = wizardSteps[stepIndex];
      if (!step.fields) return;
      for (const f of step.fields) {
        const el = stepBody.querySelector(`[name="${f.name}"]`);
        if (el) formData[f.name] = el.value.trim();
      }
    }

    function showStepError(msg) {
      const el = document.getElementById("stepError");
      if (!el) { alert(msg); return; }
      el.textContent = msg;
      el.style.display = "block";
    }

    async function goNext() {
      const step = wizardSteps[stepIndex];
      if (!step.review) {
        collectStepData();
        for (const f of (step.fields || [])) {
          if (f.required && !formData[f.name]) {
            showStepError(`${f.label.replace(" *", "")} is required.`);
            return;
          }
        }
        if (step.validate) {
          nextBtn.disabled = true;
          nextBtn.textContent = "Checking...";
          const err = await step.validate(formData);
          nextBtn.disabled = false;
          nextBtn.textContent = stepIndex === wizardSteps.length - 1 ? "Save Client" : "Next";
          if (err) { showStepError(err); return; }
        }
      }
      if (stepIndex === wizardSteps.length - 1) { await submitWizard(); return; }
      stepIndex++;
      renderStep();
    }

    function goBack() {
      if (stepIndex === 0) return;
      collectStepData();
      stepIndex--;
      renderStep();
    }

    async function submitWizard() {
      nextBtn.disabled = true;
      nextBtn.textContent = "Saving...";
      const p = normPhone(formData.phone);
      if (p) {
        const existing = allClients.find((c) => normPhone(c.phone) === p);
        if (existing) {
          nextBtn.disabled = false;
          nextBtn.textContent = "Save Client";
          alert(`This contact already exists — registered under "${existing.company_name}".`);
          return;
        }
      }
      const row = {
        company_name: formData.company_name || null,
        business_type: formData.business_type || null,
        client_name: formData.client_name || null,
        phone: formData.phone || null,
        link: formData.link || null,
        finished_website: formData.finished_website || null,
        notes: formData.notes || null,
        manager: formData.manager || null,
        status: formData.status || "Prospect",
      };
      const { error } = await sb.from("clients").insert(row);
      nextBtn.disabled = false;
      nextBtn.textContent = "Save Client";
      if (error) { alert("Insert failed: " + error.message); return; }
      closeWizard();
      load();
    }

    // ---------- Detail / Edit modal ----------
    const detailOverlay = document.getElementById("detailOverlay");
    const detailBody = document.getElementById("detailBody");
    const detailFooter = document.getElementById("detailFooter");
    const detailTitle = document.getElementById("detailTitle");

    let detailId = null;
    let detailMode = "view"; // "view" | "edit"
    let detailDraft = {};

    function openDetail(id) {
      detailId = id;
      detailMode = "view";
      renderDetail();
      detailOverlay.classList.add("open");
    }

    function closeDetail() {
      detailOverlay.classList.remove("open");
      detailId = null;
      detailMode = "view";
      detailDraft = {};
    }

    function getCurrentClient() {
      return allClients.find((c) => c.id === detailId);
    }

    function renderDetail() {
      const c = getCurrentClient();
      if (!c) { closeDetail(); return; }
      detailTitle.textContent = c.company_name || "Client Details";

      if (detailMode === "view") {
        renderDetailView(c);
      } else {
        renderDetailEdit(c);
      }
    }

    function renderDetailView(c) {
      const linkHtml = c.link
        ? `<a href="${esc(c.link)}" target="_blank" rel="noopener">${esc(c.link)}</a>`
        : '<span class="muted">—</span>';
      const webHtml = c.finished_website
        ? `<a href="${esc(c.finished_website)}" target="_blank" rel="noopener">${esc(c.finished_website)}</a>`
        : '<span class="muted">—</span>';
      const val = (v) => (v && v.toString().trim())
        ? `<div class="v">${esc(v)}</div>`
        : `<div class="v muted">—</div>`;

      detailBody.innerHTML = `
        <div class="detail-grid">
          <div class="detail-item"><div class="k">Company</div>${val(c.company_name)}</div>
          <div class="detail-item"><div class="k">Business Type</div>${val(c.business_type)}</div>
          <div class="detail-item"><div class="k">Client</div>${val(c.client_name)}</div>
          <div class="detail-item"><div class="k">Phone</div>${val(displayPhone(c.phone))}</div>
          <div class="detail-item detail-full"><div class="k">Source Link</div><div class="v">${linkHtml}</div></div>
          <div class="detail-item detail-full"><div class="k">Finished Website</div><div class="v">${webHtml}</div></div>
          <div class="detail-item"><div class="k">Manager</div>${val(c.manager)}</div>
          <div class="detail-item"><div class="k">Status</div><div class="v"><span class="badge ${statusClass(c.status)}">${esc(c.status || "Prospect")}</span></div></div>
          <div class="detail-item detail-full"><div class="k">Notes</div>${val(c.notes)}</div>
        </div>
      `;

      detailFooter.innerHTML = `
        <div></div>
        <button id="editBtn">Edit</button>
      `;
      document.getElementById("editBtn").addEventListener("click", () => {
        detailMode = "edit";
        detailDraft = { ...c };
        renderDetail();
      });
    }

    function renderDetailEdit(c) {
      const d = detailDraft;
      const managerOpts = ["", "Ivan", "Hector"].map((o) =>
        `<option value="${esc(o)}"${(d.manager || "") === o ? " selected" : ""}>${o || "— Unassigned —"}</option>`
      ).join("");
      const statusOpts = STATUSES.map((o) =>
        `<option value="${esc(o)}"${(d.status || "Prospect") === o ? " selected" : ""}>${o}</option>`
      ).join("");

      detailBody.innerHTML = `
        <div style="padding: 16px 20px;">
          <div class="field"><label>Company name *</label><input name="company_name" value="${esc(d.company_name)}" required></div>
          <div class="field"><label>Business type</label><input name="business_type" list="business_types" value="${esc(d.business_type)}"></div>
          <div class="field"><label>Client name</label><input name="client_name" value="${esc(d.client_name)}"></div>
          <div class="field"><label>Phone</label><input name="phone" type="tel" value="${esc(displayPhone(d.phone))}" placeholder="(555) 123-4567" maxlength="14" inputmode="numeric" autocomplete="tel-national"></div>
          <div class="field"><label>Source link</label><input name="link" type="url" value="${esc(d.link)}" placeholder="https://..."></div>
          <div class="field"><label>Finished website</label><input name="finished_website" type="url" value="${esc(d.finished_website)}" placeholder="https://..."></div>
          <div class="field"><label>Manager</label><select name="manager">${managerOpts}</select></div>
          <div class="field"><label>Status</label><select name="status">${statusOpts}</select></div>
          <div class="field"><label>Notes</label><textarea name="notes">${esc(d.notes)}</textarea></div>
          <div class="field-error" id="detailError" style="display:none;"></div>
        </div>
      `;

      detailFooter.innerHTML = `
        <button class="ghost" id="cancelEditBtn">Cancel</button>
        <button id="saveEditBtn">Save changes</button>
      `;
      document.getElementById("cancelEditBtn").addEventListener("click", () => {
        detailMode = "view";
        renderDetail();
      });
      document.getElementById("saveEditBtn").addEventListener("click", saveEdit);
    }

    async function saveEdit() {
      const fields = ["company_name", "business_type", "client_name", "phone", "link", "finished_website", "manager", "status", "notes"];
      const update = {};
      for (const name of fields) {
        const el = detailBody.querySelector(`[name="${name}"]`);
        if (el) update[name] = el.value.trim() || null;
      }
      if (!update.company_name) {
        const err = document.getElementById("detailError");
        err.textContent = "Company name is required.";
        err.style.display = "block";
        return;
      }

      // Duplicate phone check (exclude current record)
      const p = normPhone(update.phone);
      if (p) {
        const existing = allClients.find((c) => c.id !== detailId && normPhone(c.phone) === p);
        if (existing) {
          const err = document.getElementById("detailError");
          err.textContent = `This phone is already registered under "${existing.company_name}".`;
          err.style.display = "block";
          return;
        }
      }

      const saveBtn = document.getElementById("saveEditBtn");
      saveBtn.disabled = true;
      saveBtn.textContent = "Saving...";
      const { error } = await sb.from("clients").update(update).eq("id", detailId);
      saveBtn.disabled = false;
      saveBtn.textContent = "Save changes";
      if (error) {
        const err = document.getElementById("detailError");
        err.textContent = "Save failed: " + error.message;
        err.style.display = "block";
        return;
      }
      await load();
      // Re-open in view mode with refreshed data
      detailMode = "view";
      renderDetail();
    }

    // ---------- Wire up ----------
    document.getElementById("openWizard").addEventListener("click", openWizard);
    document.getElementById("closeWizard").addEventListener("click", closeWizard);
    wizardOverlay.addEventListener("click", (e) => { if (e.target === wizardOverlay) closeWizard(); });
    backBtn.addEventListener("click", goBack);
    nextBtn.addEventListener("click", goNext);

    document.getElementById("closeDetail").addEventListener("click", closeDetail);
    detailOverlay.addEventListener("click", (e) => { if (e.target === detailOverlay) closeDetail(); });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        if (wizardOverlay.classList.contains("open")) closeWizard();
        else if (detailOverlay.classList.contains("open")) closeDetail();
      }
      if (e.key === "Enter" && wizardOverlay.classList.contains("open") && e.target.tagName !== "TEXTAREA") {
        e.preventDefault();
        goNext();
      }
    });

    load();
  </script>
</body>
</html>
